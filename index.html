<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Адаптивный прозрачный холст</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', Arial, sans-serif;
            background: transparent !important;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        #controls {
            background: linear-gradient(135deg, #1e2b6e 0%, #2a3f8a 100%);
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10000;
            width: 100%;
            border-bottom: 2px solid #ffd966;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }
        
        .controls-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 12px;
            border-left: 4px solid #ffd966;
        }
        
        #thumbnails-container {
            display: flex;
            align-items: center;
            overflow-x: auto;
            height: 44px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            padding: 4px 8px;
            flex: 1;
            min-width: 160px;
        }
        
        #thumbnails {
            display: flex;
            gap: 8px;
        }
        
        .thumbnail {
            position: relative;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: all 0.15s ease;
        }
        
        .thumbnail:hover {
            transform: scale(1.05);
            border-color: #ffd966;
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .text-thumbnail, .sound-thumbnail, .widget-thumbnail {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
            text-align: center;
            width: 100%;
            height: 100%;
        }
        
        .sound-thumbnail { background: #e3f2fd; }
        .widget-thumbnail { background: #e8f5e9; color: #2e7d32; font-weight: bold; }
        
        .thumbnail.selected {
            border-color: #ffd966;
            box-shadow: 0 0 0 2px #ffb347;
        }
        
        .thumbnail-hidden { opacity: 0.5; }
        
        .thumbnail-button {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border: 1px solid white;
            border-radius: 50%;
            background: #f44336;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
        }
        
        .thumbnail-button.show { background: #4caf50; }
        
        #image-controls, #text-controls, #sound-controls, #widget-controls {
            display: none;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.98);
            padding: 4px 10px;
            border-radius: 12px;
            border-left: 4px solid #ffd966;
        }
        
        .panel-title {
            font-weight: bold;
            color: #1e2b6e;
            margin-right: 6px;
            font-size: 11px;
        }
        
        #canvas-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: auto;
            background: transparent !important;
            min-height: 0;
        }
        
        .canvas-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent !important;
        }
        
        #images-layer, #texts-layer, #widgets-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #images-layer { z-index: 2; }
        #texts-layer { z-index: 3; }
        #widgets-layer { z-index: 4; }
        
        .draggable-image, .draggable-text, .draggable-widget {
            position: absolute;
            cursor: move;
            touch-action: none;
            pointer-events: auto;
            box-sizing: border-box;
            transform-origin: center center;
        }
        
        .draggable-image {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .draggable-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
        }
        
        .draggable-text {
            background: rgba(255, 255, 240, 0.95);
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.15);
            white-space: pre-wrap;
            word-break: break-word;
            min-width: 50px;
            min-height: 40px;
            cursor: move;
        }
        
        .draggable-widget {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 1px solid #4caf50;
        }
        
        .draggable-widget iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
            background: white;
        }
        
        .selected {
            outline: 3px solid #ffd966;
            outline-offset: 2px;
            z-index: 999 !important;
        }
        
        .locked {
            outline: 2px solid #ff4444 !important;
        }
        
        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd966;
            border: 1px solid #1e2b6e;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: auto;
        }
        
        .rotate-corner {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #4caf50;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            cursor: grab;
            top: -28px;
            right: -28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            pointer-events: auto;
        }
        
        .rotate-corner::after { content: "↻"; }
        
        .resize-n { top: -5px; left: 50%; margin-left: -5px; cursor: n-resize; }
        .resize-ne { top: -5px; right: -5px; cursor: ne-resize; }
        .resize-e { top: 50%; right: -5px; margin-top: -5px; cursor: e-resize; }
        .resize-se { bottom: -5px; right: -5px; cursor: se-resize; }
        .resize-s { bottom: -5px; left: 50%; margin-left: -5px; cursor: s-resize; }
        .resize-sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .resize-w { top: 50%; left: -5px; margin-top: -5px; cursor: w-resize; }
        .resize-nw { top: -5px; left: -5px; cursor: nw-resize; }
        
        .selected:not(.locked) .resize-handle,
        .selected:not(.locked) .rotate-corner {
            opacity: 1;
        }
        
        button {
            padding: 5px 12px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, #2a3f8a, #1e2b6e);
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        
        button:hover { transform: translateY(-1px); filter: brightness(1.05); }
        button:active { transform: translateY(0); }
        
        #file-input, #sound-input { display: none; }
        
        #status {
            margin-left: auto;
            font-size: 11px;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: bold;
        }
        
        /* Все модальные окна по умолчанию скрыты */
        .properties-panel, #simple-text-input, #tts-panel, #widgets-panel, #crop-panel {
            display: none;
            position: fixed;
            background: rgba(30, 30, 40, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            z-index: 20000;
            border: 1px solid #ffd966;
            color: white;
        }
        
        .properties-panel { top: 100px; right: 15px; min-width: 220px; }
        #simple-text-input { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; max-width: 90vw; }
        #tts-panel, #widgets-panel, #crop-panel { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
        
        textarea, input, select {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            border: none;
            padding: 8px;
            font-size: 12px;
            margin: 5px 0;
            width: 100%;
        }
        
        .sound-visualization {
            width: 100px;
            height: 24px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .sound-progress { height: 100%; background: #2a3f8a; width: 0%; }
        
        .volume-slider { width: 70px; }
        
        .close-btn {
            background: #f44336;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .crop-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .widgets-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .widgets-tab { background: #444; padding: 5px 12px; cursor: pointer; border-radius: 20px; }
        .widgets-tab.active { background: #ffd966; color: #1e2b6e; }
        .widgets-content { display: none; }
        .widgets-content.active { display: block; }
        .saved-widget-item { display: flex; justify-content: space-between; margin: 8px 0; padding: 5px; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .saved-widget-item button { padding: 2px 10px; }
        
        @media (max-width: 700px) {
            .controls-row { gap: 5px; padding: 4px 6px; }
            button { padding: 4px 8px; font-size: 10px; }
            .thumbnail { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
<div id="controls">
    <div class="controls-row">
        <span style="font-weight: bold;">📋 Инструменты:</span>
        <button onclick="document.getElementById('file-input').click()">🖼 Изображение</button>

    <div class="controls-row">
        <span>📦 Элементы:</span>

    </div>
    <div id="image-controls"><span class="panel-title">🖼</span><button id="hide-btn">👁 Скрыть</button><button id="delete-btn">🗑 Удалить</button><button id="settings-btn">⚙ Настройки</button><button id="lock-btn">🔒 Закрепить</button><button id="flip-h-btn">↔ Гориз</button><button id="flip-v-btn">↕ Вертик</button><button id="crop-image-btn">✂ Обрезать</button></div>
    <div id="text-controls"><span class="panel-title">📝</span><button id="hide-text-btn">👁 Скрыть</button><button id="edit-text-btn">✏ Редактировать</button><button id="delete-text-btn">🗑 Удалить</button><button id="lock-text-btn">🔒 Закрепить</button><button id="crop-text-btn">✂ Обрезать</button></div>
    <div id="sound-controls"><span class="panel-title">🔊</span><button id="play-btn">▶</button><button id="pause-btn">⏸</button><div class="sound-visualization"><div class="sound-progress" id="sound-progress"></div></div><div class="volume-control"><span>🔊</span><input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100"></div><button id="delete-sound-btn">🗑 Удалить</button></div>
    <div id="widget-controls"><span class="panel-title">🧩</span><button id="hide-widget-btn">👁 Скрыть</button><button id="delete-widget-btn">🗑 Удалить</button><button id="lock-widget-btn">🔒 Закрепить</button><button id="reload-widget-btn">🔄 Обновить</button><button id="crop-widget-btn">✂ Обрезать</button></div>
</div>
<div id="canvas-wrapper"><div class="canvas-content"><div id="images-layer"></div><div id="texts-layer"></div><div id="widgets-layer"></div></div></div>

<!-- Все модальные окна изначально скрыты через CSS display: none -->
<div id="simple-text-input"><textarea id="text-input-area" placeholder="Введите текст..."></textarea><div class="text-toolbar"><select id="font-family-select"><option value="'Comic Sans MS', cursive">Comic Sans</option><option value="Arial, sans-serif">Arial</option><option value="'Times New Roman', serif">Times New Roman</option></select><input type="range" id="font-size-slider" min="12" max="72" value="24"><input type="color" id="text-color-picker" value="#000000"><button id="apply-text-simple">✅ Готово</button><button id="cancel-text-simple" style="background:#f44336;">❌</button></div></div>
<div class="properties-panel" id="properties-panel"><div class="panel-header"><h3>⚙ Свойства</h3><button class="close-btn" id="close-properties">×</button></div><label>Прозрачность: <input type="range" id="opacity-slider" min="0" max="100" value="100"></label><label>Яркость: <input type="range" id="brightness-slider" min="0" max="200" value="100"></label></div>
<div id="tts-panel"><div class="panel-header"><h3>🗣 Озвучивание</h3><button class="close-btn" id="tts-close-btn">×</button></div><textarea id="tts-text-input" placeholder="Введите текст..."></textarea><select id="tts-voice-select"></select><div><span>Скорость:</span><input type="range" id="tts-rate-slider" min="0.5" max="2" step="0.1" value="1"></div><div><span>Высота:</span><input type="range" id="tts-pitch-slider" min="0.5" max="2" step="0.1" value="1"></div><div class="crop-buttons"><button id="tts-play-btn">▶</button><button id="tts-pause-btn">⏸</button><button id="tts-stop-btn">■</button></div></div>

<input type="file" id="file-input" accept="image/*"><input type="file" id="sound-input" accept="audio/*"><audio id="audio-element"></audio>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNWDm3Rkvq4mV7Cvf5ckvZvDD5MNLDXoo",
        authDomain: "greenbackgroundapp.firebaseapp.com",
        databaseURL: "https://greenbackgroundapp-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "greenbackgroundapp",
        storageBucket: "greenbackgroundapp.appspot.com",
        messagingSenderId: "857271333291",
        appId: "1:857271333291:web:e754824268f37341c7e2ee"
    };
    firebase.initializeApp(firebaseConfig);
    
    const db = firebase.database();
    const imagesRef = db.ref('images');
    const textsRef = db.ref('texts');
    const soundsRef = db.ref('sounds');
    const widgetsRef = db.ref('widgets');
    const savedWidgetsRef = db.ref('savedWidgets');
    
    let images = {}, texts = {}, sounds = {}, widgets = {}, savedWidgets = {};
    let selectedImageId = null, selectedTextId = null, selectedSoundId = null, selectedWidgetId = null;
    let activeElement = null, dragStartX = 0, dragStartY = 0, elementStartLeft = 0, elementStartTop = 0;
    let isDragging = false;
    let canvasRect = { width: 0, height: 0 };
    
    function createId(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    // Функция для закрытия всех модальных окон
    function closeAllModals() {
        document.getElementById('simple-text-input').style.display = 'none';
        document.getElementById('properties-panel').style.display = 'none';
        document.getElementById('tts-panel').style.display = 'none';
        document.getElementById('widgets-panel').style.display = 'none';
        document.getElementById('crop-panel').style.display = 'none';
    }
    
    function updateCanvasSize() {
        const wrapper = document.getElementById('canvas-wrapper');
        if (wrapper) {
            canvasRect.width = wrapper.clientWidth;
            canvasRect.height = wrapper.clientHeight;
        }
    }
    
    window.addEventListener('resize', () => {
        updateCanvasSize();
        syncElements();
    });
    
    function syncElements() {
        updateCanvasSize();
        
        for (let id in images) {
            let data = images[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-image';
                let img = document.createElement('img');
                img.src = data.src;
                el.appendChild(img);
                document.getElementById('images-layer').appendChild(el);
                addResizeHandles(el);
                addRotateHandle(el);
                makeDraggable(el, 'image');
            }
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.width + 'px';
            el.style.height = data.height + 'px';
            el.style.opacity = data.opacity || 1;
            el.style.filter = `brightness(${data.brightness || 100}%)`;
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
            if (data.rotation) el.dataset.rotation = data.rotation;
            if (data.flipHorizontal) el.dataset.flipH = 'true';
            if (data.flipVertical) el.dataset.flipV = 'true';
            applyTransform(el);
        }
        
        for (let id in texts) {
            let data = texts[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-text';
                el.textContent = data.text;
                document.getElementById('texts-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el, 'text');
                el.addEventListener('dblclick', () => editTextById(id));
            }
            el.textContent = data.text;
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.fontSize = data.fontSize + 'px';
            el.style.color = data.color;
            el.style.fontFamily = data.fontFamily;
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
        }
        
        for (let id in widgets) {
            let data = widgets[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-widget';
                let iframe = document.createElement('iframe');
                iframe.src = data.url;
                el.appendChild(iframe);
                document.getElementById('widgets-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el, 'widget');
            }
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.width + 'px';
            el.style.height = data.height + 'px';
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
            let iframe = el.querySelector('iframe');
            if (iframe && iframe.src !== data.url) iframe.src = data.url;
        }
        
        updateThumbnails();
    }
    
    function makeDraggable(el, type) {
        el.addEventListener('mousedown', startDrag);
        el.addEventListener('touchstart', startDrag, { passive: false });
        
        function startDrag(e) {
            if (e.target.classList.contains('resize-handle') || e.target.classList.contains('rotate-corner')) return;
            if (el.classList.contains('locked')) return;
            e.preventDefault();
            
            if (type === 'image') selectImage(el.id);
            else if (type === 'text') selectText(el.id);
            else if (type === 'widget') selectWidget(el.id);
            
            activeElement = el;
            isDragging = true;
            
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            dragStartX = clientX;
            dragStartY = clientY;
            elementStartLeft = parseFloat(el.style.left) || 0;
            elementStartTop = parseFloat(el.style.top) || 0;
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('touchend', stopDrag);
        }
        
        function onDrag(e) {
            if (!isDragging || !activeElement) return;
            e.preventDefault();
            
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let deltaX = clientX - dragStartX;
            let deltaY = clientY - dragStartY;
            
            let newLeft = elementStartLeft + deltaX;
            let newTop = elementStartTop + deltaY;
            
            newLeft = Math.max(0, Math.min(newLeft, canvasRect.width - activeElement.offsetWidth));
            newTop = Math.max(0, Math.min(newTop, canvasRect.height - activeElement.offsetHeight));
            
            activeElement.style.left = newLeft + 'px';
            activeElement.style.top = newTop + 'px';
            
            const id = activeElement.id;
            if (images[id]) imagesRef.child(id).update({ x: newLeft, y: newTop });
            else if (texts[id]) textsRef.child(id).update({ x: newLeft, y: newTop });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newLeft, y: newTop });
        }
        
        function stopDrag() {
            isDragging = false;
            activeElement = null;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('touchend', stopDrag);
        }
    }
    
    function addResizeHandles(el) {
        const dirs = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
        dirs.forEach(dir => {
            let handle = document.createElement('div');
            handle.className = `resize-handle resize-${dir}`;
            handle.addEventListener('mousedown', (e) => startResize(e, el, dir));
            handle.addEventListener('touchstart', (e) => startResize(e, el, dir), { passive: false });
            el.appendChild(handle);
        });
    }
    
    function startResize(e, el, dir) {
        if (el.classList.contains('locked')) return;
        e.stopPropagation();
        e.preventDefault();
        
        let startX = e.clientX || e.touches[0].clientX;
        let startY = e.clientY || e.touches[0].clientY;
        let startW = el.offsetWidth;
        let startH = el.offsetHeight;
        let startL = parseFloat(el.style.left) || 0;
        let startT = parseFloat(el.style.top) || 0;
        
        function onResize(moveEv) {
            let currentX = moveEv.clientX || moveEv.touches[0].clientX;
            let currentY = moveEv.clientY || moveEv.touches[0].clientY;
            let dx = currentX - startX;
            let dy = currentY - startY;
            let newW = startW, newH = startH, newL = startL, newT = startT;
            
            switch(dir) {
                case 'e': newW = Math.max(30, startW + dx); break;
                case 'w': newW = Math.max(30, startW - dx); newL = startL + (startW - newW); break;
                case 's': newH = Math.max(30, startH + dy); break;
                case 'n': newH = Math.max(30, startH - dy); newT = startT + (startH - newH); break;
                case 'se': newW = Math.max(30, startW + dx); newH = Math.max(30, startH + dy); break;
                case 'sw': newW = Math.max(30, startW - dx); newH = Math.max(30, startH + dy); newL = startL + (startW - newW); break;
                case 'ne': newW = Math.max(30, startW + dx); newH = Math.max(30, startH - dy); newT = startT + (startH - newH); break;
                case 'nw': newW = Math.max(30, startW - dx); newH = Math.max(30, startH - dy); newL = startL + (startW - newW); newT = startT + (startH - newH); break;
            }
            
            newL = Math.max(0, Math.min(newL, canvasRect.width - newW));
            newT = Math.max(0, Math.min(newT, canvasRect.height - newH));
            
            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
            el.style.left = newL + 'px';
            el.style.top = newT + 'px';
            
            const id = el.id;
            if (images[id]) imagesRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
        }
        
        function stopResize() {
            document.removeEventListener('mousemove', onResize);
            document.removeEventListener('mouseup', stopResize);
            document.removeEventListener('touchmove', onResize);
            document.removeEventListener('touchend', stopResize);
        }
        
        document.addEventListener('mousemove', onResize);
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchmove', onResize, { passive: false });
        document.addEventListener('touchend', stopResize);
    }
    
    function addRotateHandle(el) {
        let rot = document.createElement('div');
        rot.className = 'rotate-corner';
        rot.addEventListener('mousedown', (e) => startRotate(e, el));
        rot.addEventListener('touchstart', (e) => startRotate(e, el), { passive: false });
        el.appendChild(rot);
    }
    
    function startRotate(e, el) {
        if (el.classList.contains('locked')) return;
        e.stopPropagation();
        e.preventDefault();
        
        let startX = e.clientX || e.touches[0].clientX;
        let startY = e.clientY || e.touches[0].clientY;
        let rect = el.getBoundingClientRect();
        let centerX = rect.left + rect.width / 2;
        let centerY = rect.top + rect.height / 2;
        let startAngle = Math.atan2(startY - centerY, startX - centerX) * 180 / Math.PI;
        let currentRot = parseFloat(el.dataset.rotation) || 0;
        
        function onRotate(moveEv) {
            let currX = moveEv.clientX || moveEv.touches[0].clientX;
            let currY = moveEv.clientY || moveEv.touches[0].clientY;
            let currAngle = Math.atan2(currY - centerY, currX - centerX) * 180 / Math.PI;
            let delta = currAngle - startAngle;
            let newRot = currentRot + delta;
            el.dataset.rotation = newRot;
            applyTransform(el);
            
            const id = el.id;
            if (images[id]) imagesRef.child(id).update({ rotation: newRot });
        }
        
        function stopRotate() {
            document.removeEventListener('mousemove', onRotate);
            document.removeEventListener('mouseup', stopRotate);
            document.removeEventListener('touchmove', onRotate);
            document.removeEventListener('touchend', stopRotate);
        }
        
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate, { passive: false });
        document.addEventListener('touchend', stopRotate);
    }
    
    function applyTransform(el) {
        let transform = '';
        let rot = el.dataset.rotation || 0;
        if (rot != 0) transform += `rotate(${rot}deg) `;
        if (el.dataset.flipH === 'true') transform += 'scaleX(-1) ';
        if (el.dataset.flipV === 'true') transform += 'scaleY(-1) ';
        el.style.transform = transform.trim();
    }
    
    function selectImage(id) { deselectAll(); selectedImageId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('image-controls').style.display = 'flex'; document.getElementById('lock-btn').textContent = el.classList.contains('locked') ? '🔓 Открепить' : '🔒 Закрепить'; } }
    function selectText(id) { deselectAll(); selectedTextId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('text-controls').style.display = 'flex'; } }
    function selectWidget(id) { deselectAll(); selectedWidgetId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('widget-controls').style.display = 'flex'; } }
    function deselectAll() { document.querySelectorAll('.selected').forEach(e => e.classList.remove('selected')); document.getElementById('image-controls').style.display = 'none'; document.getElementById('text-controls').style.display = 'none'; document.getElementById('sound-controls').style.display = 'none'; document.getElementById('widget-controls').style.display = 'none'; document.getElementById('properties-panel').style.display = 'none'; selectedImageId = selectedTextId = selectedSoundId = selectedWidgetId = null; }
    
    function updateThumbnails() {
        let cont = document.getElementById('thumbnails');
        cont.innerHTML = '';
        for (let id in images) { cont.appendChild(createThumb(id, 'image', images[id].src, 'img')); }
        for (let id in texts) { cont.appendChild(createThumbText(id, 'text', texts[id].text, '📝')); }
        for (let id in widgets) { cont.appendChild(createThumbText(id, 'widget', widgets[id].name || 'Виджет', '🧩')); }
        for (let id in sounds) { cont.appendChild(createThumbText(id, 'sound', sounds[id].name || 'Звук', '🔊')); }
    }
    
    function createThumb(id, type, src, imgType) {
        let thumb = document.createElement('div');
        thumb.className = 'thumbnail';
        let data = type === 'image' ? images[id] : null;
        if (data && data.display === 'none') thumb.classList.add('thumbnail-hidden');
        if ((type === 'image' && selectedImageId === id) || (type === 'text' && selectedTextId === id) || (type === 'widget' && selectedWidgetId === id) || (type === 'sound' && selectedSoundId === id)) thumb.classList.add('selected');
        
        if (imgType === 'img') {
            let img = document.createElement('img');
            img.src = src;
            thumb.appendChild(img);
        } else {
            let div = document.createElement('div');
            div.className = type === 'text' ? 'text-thumbnail' : (type === 'widget' ? 'widget-thumbnail' : 'sound-thumbnail');
            div.textContent = src.substring(0, 8);
            thumb.appendChild(div);
        }
        
        let btn = document.createElement('button');
        btn.className = 'thumbnail-button';
        btn.textContent = '✕';
        btn.onclick = (e) => { e.stopPropagation(); toggleVisibility(id, type); };
        thumb.appendChild(btn);
        thumb.onclick = () => { if (type === 'image') selectImage(id); else if (type === 'text') selectText(id); else if (type === 'widget') selectWidget(id); else if (type === 'sound') { deselectAll(); selectedSoundId = id; document.getElementById('sound-controls').style.display = 'flex'; updateThumbnails(); } };
        return thumb;
    }
    
    function createThumbText(id, type, text, icon) {
        let thumb = document.createElement('div');
        thumb.className = 'thumbnail';
        let data = type === 'text' ? texts[id] : (type === 'widget' ? widgets[id] : sounds[id]);
        if (data && data.display === 'none') thumb.classList.add('thumbnail-hidden');
        if ((type === 'image' && selectedImageId === id) || (type === 'text' && selectedTextId === id) || (type === 'widget' && selectedWidgetId === id) || (type === 'sound' && selectedSoundId === id)) thumb.classList.add('selected');
        
        let div = document.createElement('div');
        div.className = type === 'text' ? 'text-thumbnail' : (type === 'widget' ? 'widget-thumbnail' : 'sound-thumbnail');
        div.textContent = (text || icon).substring(0, 8);
        thumb.appendChild(div);
        
        let btn = document.createElement('button');
        btn.className = 'thumbnail-button';
        btn.textContent = '✕';
        btn.onclick = (e) => { e.stopPropagation(); toggleVisibility(id, type); };
        thumb.appendChild(btn);
        thumb.onclick = () => { if (type === 'text') selectText(id); else if (type === 'widget') selectWidget(id); else if (type === 'sound') { deselectAll(); selectedSoundId = id; document.getElementById('sound-controls').style.display = 'flex'; updateThumbnails(); } };
        return thumb;
    }
    
    function toggleVisibility(id, type) {
        let el = document.getElementById(id);
        let newDisplay = el.style.display === 'none' ? 'block' : 'none';
        el.style.display = newDisplay;
        if (type === 'image') imagesRef.child(id).update({ display: newDisplay });
        else if (type === 'text') textsRef.child(id).update({ display: newDisplay });
        else if (type === 'widget') widgetsRef.child(id).update({ display: newDisplay });
        else if (type === 'sound') soundsRef.child(id).update({ display: newDisplay });
        updateThumbnails();
    }
    
    function editTextById(id) {
        let data = texts[id];
        if (!data) return;
        let panel = document.getElementById('simple-text-input');
        document.getElementById('text-input-area').value = data.text;
        document.getElementById('font-size-slider').value = data.fontSize;
        document.getElementById('text-color-picker').value = data.color;
        document.getElementById('font-family-select').value = data.fontFamily;
        panel.style.display = 'block';
        
        let oldApply = document.getElementById('apply-text-simple').onclick;
        document.getElementById('apply-text-simple').onclick = () => {
            let newText = document.getElementById('text-input-area').value.trim();
            if (newText) {
                textsRef.child(id).update({
                    text: newText,
                    fontSize: parseInt(document.getElementById('font-size-slider').value),
                    color: document.getElementById('text-color-picker').value,
                    fontFamily: document.getElementById('font-family-select').value
                });
            }
            panel.style.display = 'none';
            document.getElementById('apply-text-simple').onclick = oldApply;
        };
    }
    
    imagesRef.on('value', s => { images = s.val() || {}; syncElements(); });
    textsRef.on('value', s => { texts = s.val() || {}; syncElements(); });
    widgetsRef.on('value', s => { widgets = s.val() || {}; syncElements(); });
    soundsRef.on('value', s => { sounds = s.val() || {}; updateThumbnails(); });
    savedWidgetsRef.on('value', s => { savedWidgets = s.val() || {}; updateSavedList(); });
    
    function updateSavedList() {
        let list = document.getElementById('saved-widgets-list');
        if (list) {
            list.innerHTML = '';
            Object.values(savedWidgets).forEach(w => {
                let div = document.createElement('div');
                div.className = 'saved-widget-item';
                div.innerHTML = `<span>${w.name || 'Виджет'}</span><button class="add-widget-btn">+</button>`;
                div.querySelector('button').onclick = () => {
                    let id = createId('widget');
                    widgetsRef.child(id).set({ id, url: w.url, name: w.name, x: 80, y: 80, width: w.width || 350, height: w.height || 250, display: 'block' });
                };
                list.appendChild(div);
            });
        }
    }
    
    // Инициализация обработчиков с закрытием модальных окон
    document.getElementById('add-text-btn').onclick = () => { closeAllModals(); document.getElementById('simple-text-input').style.display = 'block'; };
    document.getElementById('apply-text-simple').onclick = () => {
        let txt = document.getElementById('text-input-area').value.trim();
        if (txt) {
            let id = createId('text');
            textsRef.child(id).set({ id, text: txt, x: 80, y: 80, fontSize: parseInt(document.getElementById('font-size-slider').value), color: document.getElementById('text-color-picker').value, fontFamily: document.getElementById('font-family-select').value, display: 'block' });
        }
        document.getElementById('simple-text-input').style.display = 'none';
    };
    document.getElementById('cancel-text-simple').onclick = () => document.getElementById('simple-text-input').style.display = 'none';
    document.getElementById('add-sound-btn').onclick = () => document.getElementById('sound-input').click();
    document.getElementById('add-widget-btn').onclick = () => { closeAllModals(); document.getElementById('widgets-panel').style.display = 'block'; };
    document.getElementById('close-widgets-btn').onclick = () => document.getElementById('widgets-panel').style.display = 'none';
    document.getElementById('add-widget-direct-btn').onclick = () => {
        let url = document.getElementById('widget-url-input').value.trim();
        if (!url) return alert('Введите URL');
        let id = createId('widget');
        widgetsRef.child(id).set({ id, url, name: document.getElementById('widget-name-input').value.trim() || 'Виджет', x: 80, y: 80, width: parseInt(document.getElementById('widget-width-input').value) || 350, height: parseInt(document.getElementById('widget-height-input').value) || 250, display: 'block' });
        document.getElementById('widgets-panel').style.display = 'none';
    };
    document.getElementById('save-widget-btn').onclick = () => {
        let url = document.getElementById('widget-url-input').value.trim();
        if (url) savedWidgetsRef.push({ url, name: document.getElementById('widget-name-input').value.trim() || 'Виджет', width: parseInt(document.getElementById('widget-width-input').value) || 350, height: parseInt(document.getElementById('widget-height-input').value) || 250 });
    };
    document.getElementById('file-input').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let img = new Image();
                img.onload = () => {
                    let id = createId('img');
                    imagesRef.child(id).set({ id, src: ev.target.result, x: 50, y: 50, width: Math.min(400, img.width), height: Math.min(300, img.height), opacity: 1, brightness: 100, display: 'block' });
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        }
    };
    document.getElementById('sound-input').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let id = createId('sound');
                soundsRef.child(id).set({ id, src: ev.target.result, name: f.name, volume: 100, display: 'block' });
            };
            r.readAsDataURL(f);
        }
    };
    document.getElementById('clear-btn').onclick = () => { if (confirm('Очистить всё?')) { imagesRef.remove(); textsRef.remove(); soundsRef.remove(); widgetsRef.remove(); } };
    document.getElementById('speak-text-btn').onclick = () => { closeAllModals(); document.getElementById('tts-panel').style.display = 'block'; };
    document.getElementById('tts-close-btn').onclick = () => document.getElementById('tts-panel').style.display = 'none';
    document.getElementById('tts-play-btn').onclick = () => {
        let t = document.getElementById('tts-text-input').value;
        if (t) { let u = new SpeechSynthesisUtterance(t); u.rate = parseFloat(document.getElementById('tts-rate-slider').value); u.pitch = parseFloat(document.getElementById('tts-pitch-slider').value); speechSynthesis.cancel(); speechSynthesis.speak(u); }
    };
    document.getElementById('delete-btn').onclick = () => { if (selectedImageId) imagesRef.child(selectedImageId).remove(); deselectAll(); };
    document.getElementById('delete-text-btn').onclick = () => { if (selectedTextId) textsRef.child(selectedTextId).remove(); deselectAll(); };
    document.getElementById('delete-widget-btn').onclick = () => { if (selectedWidgetId) widgetsRef.child(selectedWidgetId).remove(); deselectAll(); };
    document.getElementById('delete-sound-btn').onclick = () => { if (selectedSoundId) soundsRef.child(selectedSoundId).remove(); deselectAll(); };
    document.getElementById('hide-btn').onclick = () => { if (selectedImageId) toggleVisibility(selectedImageId, 'image'); };
    document.getElementById('hide-text-btn').onclick = () => { if (selectedTextId) toggleVisibility(selectedTextId, 'text'); };
    document.getElementById('hide-widget-btn').onclick = () => { if (selectedWidgetId) toggleVisibility(selectedWidgetId, 'widget'); };
    document.getElementById('lock-btn').onclick = () => { if (selectedImageId) { let el = document.getElementById(selectedImageId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); imagesRef.child(selectedImageId).update({ locked }); } };
    document.getElementById('lock-text-btn').onclick = () => { if (selectedTextId) { let el = document.getElementById(selectedTextId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); textsRef.child(selectedTextId).update({ locked }); } };
    document.getElementById('lock-widget-btn').onclick = () => { if (selectedWidgetId) { let el = document.getElementById(selectedWidgetId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); widgetsRef.child(selectedWidgetId).update({ locked }); } };
    document.getElementById('flip-h-btn').onclick = () => { if (selectedImageId) { let el = document.getElementById(selectedImageId); let val = el.dataset.flipH === 'true'; el.dataset.flipH = (!val).toString(); applyTransform(el); imagesRef.child(selectedImageId).update({ flipHorizontal: !val }); } };
    document.getElementById('flip-v-btn').onclick = () => { if (selectedImageId) { let el = document.getElementById(selectedImageId); let val = el.dataset.flipV === 'true'; el.dataset.flipV = (!val).toString(); applyTransform(el); imagesRef.child(selectedImageId).update({ flipVertical: !val }); } };
    document.getElementById('settings-btn').onclick = () => { closeAllModals(); document.getElementById('properties-panel').style.display = 'block'; };
    document.getElementById('close-properties').onclick = () => document.getElementById('properties-panel').style.display = 'none';
    document.getElementById('opacity-slider').oninput = e => { if (selectedImageId) imagesRef.child(selectedImageId).update({ opacity: e.target.value / 100 }); };
    document.getElementById('brightness-slider').oninput = e => { if (selectedImageId) imagesRef.child(selectedImageId).update({ brightness: e.target.value }); };
    document.getElementById('play-btn').onclick = () => { if (selectedSoundId && sounds[selectedSoundId]) { let a = document.getElementById('audio-element'); a.src = sounds[selectedSoundId].src; a.volume = (sounds[selectedSoundId].volume || 100) / 100; a.play(); } };
    document.getElementById('pause-btn').onclick = () => document.getElementById('audio-element').pause();
    document.getElementById('volume-slider').oninput = e => { if (selectedSoundId) soundsRef.child(selectedSoundId).update({ volume: e.target.value }); };
    document.getElementById('reload-widget-btn').onclick = () => { if (selectedWidgetId) { let iframe = document.getElementById(selectedWidgetId)?.querySelector('iframe'); if (iframe) iframe.src = iframe.src; } };
    document.getElementById('crop-image-btn').onclick = () => { closeAllModals(); document.getElementById('crop-panel').style.display = 'block'; };
    document.getElementById('crop-text-btn').onclick = () => { closeAllModals(); document.getElementById('crop-panel').style.display = 'block'; };
    document.getElementById('crop-widget-btn').onclick = () => { closeAllModals(); document.getElementById('crop-panel').style.display = 'block'; };
    document.getElementById('close-crop-btn').onclick = () => document.getElementById('crop-panel').style.display = 'none';
    document.getElementById('cancel-crop-btn').onclick = () => document.getElementById('crop-panel').style.display = 'none';
    document.getElementById('apply-crop-btn').onclick = () => {
        alert('Обрезка применена');
        document.getElementById('crop-panel').style.display = 'none';
    };
    document.getElementById('edit-text-btn').onclick = () => { if (selectedTextId) editTextById(selectedTextId); };
    
    document.querySelectorAll('.widgets-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.widgets-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.widgets-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + '-content').classList.add('active');
        };
    });
    
    // Закрытие модальных окон по клику вне их области (опционально)
    window.onclick = (e) => {
        if (e.target === document.getElementById('simple-text-input')) document.getElementById('simple-text-input').style.display = 'none';
        if (e.target === document.getElementById('tts-panel')) document.getElementById('tts-panel').style.display = 'none';
        if (e.target === document.getElementById('widgets-panel')) document.getElementById('widgets-panel').style.display = 'none';
        if (e.target === document.getElementById('crop-panel')) document.getElementById('crop-panel').style.display = 'none';
        if (e.target === document.getElementById('properties-panel')) document.getElementById('properties-panel').style.display = 'none';
    };
    
    // Инициализация
    updateCanvasSize();
    closeAllModals(); // Гарантированно закрываем все окна при загрузке
    setTimeout(() => { updateCanvasSize(); syncElements(); }, 100);
    window.addEventListener('resize', () => { updateCanvasSize(); syncElements(); });
</script>
