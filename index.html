        function toggleTextLock() {
            if (selectedTextId) {
                const textElement = document.getElementById(selectedTextId);
                if (!textElement) return;
               
                const isLocked = textElement.classList.contains('locked');
               
                if (isLocked) {
                    textElement.classList.remove('locked');
                    document.getElementById('lock-text-btn').textContent = '🔒 Закрепить';
                } else {
                    textElement.classList.add('locked');
                    document.getElementById('lock-text-btn').textContent = '🔓 Открепить';
                }
               
                textsRef.child(selectedTextId).update({
                    locked: !isLocked
                });
                saveStateToHistory();
            }
        }
       
        function updateCanvas(imagesData) {
            const container = document.getElementById('images-layer');
           
            document.querySelectorAll('.draggable-image').forEach(img => {
                if (!imagesData[img.id]) {
                    img.remove();
                    if (selectedImageId === img.id) {
                        selectedImageId = null;
                    }
                }
            });
           
            for (const id in imagesData) {
                const imgData = imagesData[id];
                let img = document.getElementById(id);
               
                if (!img) {
                    img = createImageElement(imgData);
                    container.appendChild(img);
                }
               
                updateImagePositionAndSize(img, imgData);
                updateImageOpacity(img, imgData);
                updateImageBrightness(img, imgData);
                updateImageLockState(img, imgData);
                updateImageDisplayState(img, imgData);
                updateImageTransformations(img, imgData);
                
                if (imgData.crop) {
                    img.style.clipPath = `inset(${imgData.crop.y}px ${img.offsetWidth - imgData.crop.x - imgData.crop.width}px ${img.offsetHeight - imgData.crop.y - imgData.crop.height}px ${imgData.crop.x}px)`;
                }
               
                if (imgData.isNew) {
                    document.querySelectorAll('.draggable-image, .draggable-text, .draggable-widget').forEach(el => el.classList.remove('selected'));
                    
                    img.classList.add('selected');
                    selectedImageId = id;
                    selectedTextId = null;
                    selectedSoundId = null;
                    selectedWidgetId = null;
                    
                    document.getElementById('text-controls').style.display = 'none';
                    document.getElementById('sound-controls').style.display = 'none';
                    document.getElementById('widget-controls').style.display = 'none';
                    document.getElementById('image-controls').style.display = 'flex';
                   
                    const lockBtn = document.getElementById('lock-btn');
                    lockBtn.textContent = imgData.locked ? '🔓 Открепить' : '🔒 Закрепить';
                   
                    imagesRef.child(id).update({ isNew: null });
                }
            }
        }
       
        function updateTexts(textsData) {
            const container = document.getElementById('texts-layer');
           
            document.querySelectorAll('.draggable-text').forEach(textEl => {
                if (!textsData[textEl.id]) {
                    textEl.remove();
                    if (selectedTextId === textEl.id) {
                        selectedTextId = null;
                    }
                }
            });
           
            for (const id in textsData) {
                const textData = textsData[id];
                let textEl = document.getElementById(id);
               
                if (!textEl) {
                    textEl = createTextElement(textData);
                    container.appendChild(textEl);
                } else {
                    updateTextContent(textEl, textData);
                    updateTextLockState(textEl, textData);
                    updateTextDisplayState(textEl, textData);
                }
               
                if (textData.opacity !== undefined) {
                    textEl.style.opacity = textData.opacity;
                }
               
                if (textData.fontFamily) {
                    textEl.style.fontFamily = textData.fontFamily;
                }
                
                if (textData.crop) {
                    textEl.style.overflow = 'hidden';
                    textEl.style.maxWidth = textData.crop.width + 'px';
                    textEl.style.maxHeight = textData.crop.height + 'px';
                }
               
                if (textData.isNew) {
                    document.querySelectorAll('.draggable-image, .draggable-text, .draggable-widget').forEach(el => el.classList.remove('selected'));
                    
                    textEl.classList.add('selected');
                    selectedTextId = id;
                    selectedImageId = null;
                    selectedSoundId = null;
                    selectedWidgetId = null;
                    
                    document.getElementById('image-controls').style.display = 'none';
                    document.getElementById('sound-controls').style.display = 'none';
                    document.getElementById('widget-controls').style.display = 'none';
                    document.getElementById('text-controls').style.display = 'flex';
                   
                    const lockBtn = document.getElementById('lock-text-btn');
                    lockBtn.textContent = textData.locked ? '🔓 Открепить' : '🔒 Закрепить';
                   
                    textsRef.child(id).update({ isNew: null });
                }
            }
        }
       
        function createImageElement(imgData) {
            const imgWrapper = document.createElement('div');
            imgWrapper.id = imgData.id;
            imgWrapper.className = 'draggable-image';
            imgWrapper.style.left = imgData.x + 'px';
            imgWrapper.style.top = imgData.y + 'px';
            imgWrapper.style.width = imgData.width + 'px';
            imgWrapper.style.height = imgData.height + 'px';
            imgWrapper.style.opacity = imgData.opacity !== undefined ? imgData.opacity : 1;
            imgWrapper.style.filter = `brightness(${imgData.brightness !== undefined ? imgData.brightness : 100}%)`;
           
            if (imgData.rotation !== undefined) {
                imgWrapper.dataset.rotation = imgData.rotation;
            }
            if (imgData.flipHorizontal !== undefined) {
                imgWrapper.dataset.flipH = imgData.flipHorizontal.toString();
            }
            if (imgData.flipVertical !== undefined) {
                imgWrapper.dataset.flipV = imgData.flipVertical.toString();
            }
           
            applyTransformations(imgWrapper);
           
            if (imgData.locked) {
                imgWrapper.classList.add('locked');
            }
           
            if (imgData.display === 'none') {
                imgWrapper.style.display = 'none';
            } else {
                imgWrapper.style.display = 'block';
            }
            
            if (imgData.crop) {
                imgWrapper.style.clipPath = `inset(${imgData.crop.y}px ${imgData.width - imgData.crop.x - imgData.crop.width}px ${imgData.height - imgData.crop.y - imgData.crop.height}px ${imgData.crop.x}px)`;
            }
           
            const img = document.createElement('img');
            img.src = imgData.src;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'contain';
            img.draggable = false;
            imgWrapper.appendChild(img);
           
            addResizeHandles(imgWrapper);
            addRotateHandle(imgWrapper);
           
            imgWrapper.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('rotate-corner')) {
                    e.preventDefault();
                    e.stopPropagation();
                    startRotate(e);
                    return;
                }
                if (e.target.classList.contains('resize-handle')) {
                    return;
                }
                if (e.shiftKey || e.altKey) {
                    e.preventDefault();
                    e.stopPropagation();
                    startRotateImage(e);
                } else {
                    startSelect(e);
                }
            });
           
            imgWrapper.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('rotate-corner') || 
                    e.target.classList.contains('resize-handle')) return;
                startSelect(e);
            }, { passive: false });
           
            return imgWrapper;
        }
       
        function createTextElement(textData) {
            const textEl = document.createElement('div');
            textEl.id = textData.id;
            textEl.className = 'draggable-text';
            textEl.style.left = textData.x + 'px';
            textEl.style.top = textData.y + 'px';
            textEl.textContent = textData.text || '';
            textEl.style.fontSize = (textData.fontSize || 16) + 'px';
            textEl.style.color = textData.color || '#000000';
           
            if (textData.fontFamily) {
                textEl.style.fontFamily = textData.fontFamily;
            } else {
                textEl.style.fontFamily = "'Comic Sans MS', cursive";
            }
           
            if (textData.opacity !== undefined) {
                textEl.style.opacity = textData.opacity;
            } else {
                textEl.style.opacity = 1;
            }
           
            if (textData.locked) {
                textEl.classList.add('locked');
            }
           
            if (textData.display === 'none') {
                textEl.style.display = 'none';
            } else {
                textEl.style.display = 'block';
            }
            
            if (textData.crop) {
                textEl.style.overflow = 'hidden';
                textEl.style.maxWidth = textData.crop.width + 'px';
                textEl.style.maxHeight = textData.crop.height + 'px';
            }
           
            textEl.style.width = 'auto';
            textEl.style.height = 'auto';
           
            addResizeHandles(textEl);
           
            textEl.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                startTextSelect(e);
            });
            textEl.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                startTextSelect(e);
            }, { passive: false });
           
            textEl.addEventListener('dblclick', (e) => {
                e.preventDefault();
                e.stopPropagation();
                editSelectedText();
            });
           
            return textEl;
        }
       
        function addResizeHandles(element) {
            element.querySelectorAll('.resize-handle').forEach(handle => handle.remove());
           
            const directions = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
           
            directions.forEach(dir => {
                const handle = document.createElement('div');
                handle.className = `resize-handle resize-${dir}`;
                element.appendChild(handle);
               
                handle.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    startResize(e, dir);
                });
               
                handle.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    startResize(e, dir);
                }, { passive: false });
            });
        }
       
        function addRotateHandle(element) {
            element.querySelectorAll('.rotate-corner').forEach(handle => handle.remove());
           
            const handle = document.createElement('div');
            handle.className = 'rotate-corner';
            handle.title = 'Вращать (Alt + перетаскивание фотографии)';
            element.appendChild(handle);
           
            const indicator = document.createElement('div');
            indicator.className = 'rotate-indicator';
            indicator.textContent = '0°';
            element.appendChild(indicator);
           
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                startRotate(e);
            });
           
            handle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                startRotate(e);
            }, { passive: false });
        }
       
        function updateImageTransformations(img, imgData) {
            if (imgData.rotation !== undefined) {
                img.dataset.rotation = imgData.rotation;
            }
            if (imgData.flipHorizontal !== undefined) {
                img.dataset.flipH = imgData.flipHorizontal.toString();
            }
            if (imgData.flipVertical !== undefined) {
                img.dataset.flipV = imgData.flipVertical.toString();
            }
            applyTransformations(img);
            
            const indicator = img.querySelector('.rotate-indicator');
            if (indicator) {
                const rotation = imgData.rotation || 0;
                indicator.textContent = rotation + '°';
            }
        }
       
        function startRotate(e) {
            e.preventDefault();
            e.stopPropagation();
           
            activeInteraction = 'rotate';
            activeElement = e.currentTarget.parentElement;
           
            const rect = activeElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
           
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
           
            startRotation = parseFloat(activeElement.dataset.rotation) || 0;
        }
       
        function startRotateImage(e) {
            e.preventDefault();
            e.stopPropagation();
           
            const imgElement = e.currentTarget;
            const isLocked = imgElement.classList.contains('locked');
           
            if (isLocked) return;
           
            document.querySelectorAll('.draggable-image, .draggable-text, .draggable-widget').forEach(el => el.classList.remove('selected'));
           
            imgElement.classList.add('selected');
            selectedImageId = imgElement.id;
            selectedTextId = null;
            selectedSoundId = null;
            selectedWidgetId = null;
            
            document.getElementById('text-controls').style.display = 'none';
            document.getElementById('sound-controls').style.display = 'none';
            document.getElementById('widget-controls').style.display = 'none';
            document.getElementById('image-controls').style.display = 'flex';
           
            const lockBtn = document.getElementById('lock-btn');
            lockBtn.textContent = isLocked ? '🔓 Открепить' : '🔒 Закрепить';
           
            activeInteraction = 'rotateImage';
            activeElement = imgElement;
           
            const rect = imgElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
           
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
           
            const dx = startX - centerX;
            const dy = startY - centerY;
            startRotation = Math.atan2(dy, dx) * 180 / Math.PI;
           
            const currentImgRotation = parseFloat(imgElement.dataset.rotation) || 0;
           
            startRotation -= currentImgRotation;
        }
       
        function startSelect(e) {
            e.preventDefault();
            e.stopPropagation();
           
            const imgElement = e.currentTarget;
            const isLocked = imgElement.classList.contains('locked');
           
            document.querySelectorAll('.draggable-image, .draggable-text, .draggable-widget').forEach(el => el.classList.remove('selected'));
           
            imgElement.classList.add('selected');
            selectedImageId = imgElement.id;
            selectedTextId = null;
            selectedSoundId = null;
            selectedWidgetId = null;
            
            document.getElementById('text-controls').style.display = 'none';
            document.getElementById('sound-controls').style.display = 'none';
            document.getElementById('widget-controls').style.display = 'none';
            document.getElementById('image-controls').style.display = 'flex';
           
            const lockBtn = document.getElementById('lock-btn');
            lockBtn.textContent = isLocked ? '🔓 Открепить' : '🔒 Закрепить';
           
            if (!isLocked) {
                activeInteraction = 'select';
                activeElement = imgElement;
               
                const currentX = parseInt(imgElement.style.left) || 0;
                const currentY = parseInt(imgElement.style.top) || 0;
               
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX - currentX;
                    startY = e.touches[0].clientY - currentY;
                } else {
                    startX = e.clientX - currentX;
                    startY = e.clientY - currentY;
                }
            }
        }
       
        function startTextSelect(e) {
            e.preventDefault();
            e.stopPropagation();
           
            const textElement = e.currentTarget;
            const isLocked = textElement.classList.contains('locked');
           
            document.querySelectorAll('.draggable-image, .draggable-text, .draggable-widget').forEach(el => el.classList.remove('selected'));
           
            textElement.classList.add('selected');
            selectedTextId = textElement.id;
            selectedImageId = null;
            selectedSoundId = null;
            selectedWidgetId = null;
            
            document.getElementById('image-controls').style.display = 'none';
            document.getElementById('sound-controls').style.display = 'none';
            document.getElementById('widget-controls').style.display = 'none';
            document.getElementById('text-controls').style.display = 'flex';
           
            const lockBtn = document.getElementById('lock-text-btn');
            lockBtn.textContent = isLocked ? '🔓 Открепить' : '🔒 Закрепить';
           
            if (!isLocked) {
                activeInteraction = 'select';
                activeElement = textElement;
               
                const currentX = parseInt(textElement.style.left) || 0;
                const currentY = parseInt(textElement.style.top) || 0;
               
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX - currentX;
                    startY = e.touches[0].clientY - currentY;
                } else {
                    startX = e.clientX - currentX;
                    startY = e.clientY - currentY;
                }
            }
        }
       
        function updateImagePositionAndSize(img, imgData) {
            if (activeElement !== img) {
                img.style.left = imgData.x + 'px';
                img.style.top = imgData.y + 'px';
                img.style.width = imgData.width + 'px';
                img.style.height = imgData.height + 'px';
            }
        }
       
        function updateTextContent(textEl, textData) {
            textEl.textContent = textData.text || '';
            textEl.style.fontSize = (textData.fontSize || 16) + 'px';
            textEl.style.color = textData.color || '#000000';
            if (textData.fontFamily) {
                textEl.style.fontFamily = textData.fontFamily;
            }
        }
       
        function updateImageOpacity(img, imgData) {
            img.style.opacity = imgData.opacity !== undefined ? imgData.opacity : 1;
        }
       
        function updateImageBrightness(img, imgData) {
            if (imgData.brightness !== undefined) {
                img.style.filter = `brightness(${imgData.brightness}%)`;
            } else {
                img.style.filter = 'brightness(100%)';
            }
        }
       
        function updateImageLockState(img, imgData) {
            if (imgData.locked) {
                img.classList.add('locked');
                img.style.cursor = 'default';
            } else {
                img.classList.remove('locked');
                img.style.cursor = 'move';
            }
        }
       
        function updateImageDisplayState(img, imgData) {
            if (imgData.display === 'none') {
                img.style.display = 'none';
            } else {
                img.style.display = 'block';
            }
        }
       
        function updateTextDisplayState(textEl, textData) {
            if (textData.display === 'none') {
                textEl.style.display = 'none';
            } else {
                textEl.style.display = 'block';
            }
        }
       
        function updateTextLockState(textEl, textData) {
            if (textData.locked) {
                textEl.classList.add('locked');
                textEl.style.cursor = 'default';
            } else {
                textEl.classList.remove('locked');
                textEl.style.cursor = 'move';
            }
        }
       
        function clearCanvas() {
            if (confirm("Очистить холст для всех пользователей?")) {
                imagesRef.remove();
                textsRef.remove();
                soundsRef.remove();
                widgetsRef.remove();
                deselectAllElements();
                saveStateToHistory();
            }
        }
       
        function startResize(e, direction) {
            if (e.currentTarget.parentElement.classList.contains('locked')) return;
           
            e.preventDefault();
            e.stopPropagation();
           
            activeInteraction = 'resize';
            activeElement = e.currentTarget.parentElement;
            resizeDirection = direction;
           
            const rect = activeElement.getBoundingClientRect();
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
           
            startWidth = parseFloat(activeElement.style.width) || activeElement.offsetWidth;
            startHeight = parseFloat(activeElement.style.height) || activeElement.offsetHeight;
            startLeft = parseFloat(activeElement.style.left) || 0;
            startTop = parseFloat(activeElement.style.top) || 0;
        }
       
        function handleMove(e) {
            if (!activeInteraction || !activeElement) return;
            if (activeElement.classList.contains('locked')) return;
           
            e.preventDefault();
            let clientX, clientY;
           
            if (e.type === 'touchmove') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
           
            if (activeInteraction === 'select' || activeInteraction === 'drag') {
                const x = clientX - startX;
                const y = clientY - startY;
               
                const container = document.getElementById('canvas-wrapper');
                const maxX = container.offsetWidth - activeElement.offsetWidth;
                const maxY = container.offsetHeight - activeElement.offsetHeight;
               
                const boundedX = Math.max(0, Math.min(x, maxX));
                const boundedY = Math.max(0, Math.min(y, maxY));
               
                activeElement.style.left = boundedX + 'px';
                activeElement.style.top = boundedY + 'px';
               
                if (activeElement.classList.contains('draggable-image')) {
                    imagesRef.child(activeElement.id).update({
                        x: boundedX,
                        y: boundedY
                    });
                } else if (activeElement.classList.contains('draggable-text')) {
                    textsRef.child(activeElement.id).update({
                        x: boundedX,
                        y: boundedY
                    });
                } else if (activeElement.classList.contains('draggable-widget')) {
                    widgetsRef.child(activeElement.id).update({
                        x: boundedX,
                        y: boundedY
                    });
                }
               
                if (activeInteraction === 'select') {
                    activeInteraction = 'drag';
                }
            }
            else if (activeInteraction === 'resize') {
                const deltaX = clientX - startX;
                const deltaY = clientY - startY;
               
                let newWidth = startWidth;
                let newHeight = startHeight;
                let newLeft = startLeft;
                let newTop = startTop;
               
                switch (resizeDirection) {
                    case 'n':
                        newHeight = Math.max(20, startHeight - deltaY);
                        newTop = startTop + (startHeight - newHeight);
                        break;
                    case 'ne':
                        newHeight = Math.max(20, startHeight - deltaY);
                        newTop = startTop + (startHeight - newHeight);
                        newWidth = Math.max(20, startWidth + deltaX);
                        break;
                    case 'e':
                        newWidth = Math.max(20, startWidth + deltaX);
                        break;
                    case 'se':
                        newWidth = Math.max(20, startWidth + deltaX);
                        newHeight = Math.max(20, startHeight + deltaY);
                        break;
                    case 's':
                        newHeight = Math.max(20, startHeight + deltaY);
                        break;
                    case 'sw':
                        newWidth = Math.max(20, startWidth - deltaX);
                        newLeft = startLeft + (startWidth - newWidth);
                        newHeight = Math.max(20, startHeight + deltaY);
                        break;
                    case 'w':
                        newWidth = Math.max(20, startWidth - deltaX);
                        newLeft = startLeft + (startWidth - newWidth);
                        break;
                    case 'nw':
                        newWidth = Math.max(20, startWidth - deltaX);
                        newLeft = startLeft + (startWidth - newWidth);
                        newHeight = Math.max(20, startHeight - deltaY);
                        newTop = startTop + (startHeight - newHeight);
                        break;
                }
               
                activeElement.style.width = newWidth + 'px';
                activeElement.style.height = newHeight + 'px';
                activeElement.style.left = newLeft + 'px';
                activeElement.style.top = newTop + 'px';
               
                if (activeElement.classList.contains('draggable-image')) {
                    imagesRef.child(activeElement.id).update({
                        width: newWidth,
                        height: newHeight,
                        x: newLeft,
                        y: newTop
                    });
                } else if (activeElement.classList.contains('draggable-text')) {
                    textsRef.child(activeElement.id).update({
                        x: newLeft,
                        y: newTop
                    });
                } else if (activeElement.classList.contains('draggable-widget')) {
                    widgetsRef.child(activeElement.id).update({
                        width: newWidth,
                        height: newHeight,
                        x: newLeft,
                        y: newTop
                    });
                }
            }
            else if (activeInteraction === 'rotate' || activeInteraction === 'rotateImage') {
                const rect = activeElement.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
               
                const dx = clientX - centerX;
                const dy = clientY - centerY;
                let currentAngle = Math.atan2(dy, dx) * 180 / Math.PI;
               
                if (activeInteraction === 'rotateImage') {
                    currentAngle = currentAngle - startRotation;
                } else {
                    const startAngle = Math.atan2(startY - centerY, startX - centerX) * 180 / Math.PI;
                    let deltaAngle = currentAngle - startAngle;
                   
                    if (deltaAngle > 180) deltaAngle -= 360;
                    if (deltaAngle < -180) deltaAngle += 360;
                   
                    currentAngle = startRotation + deltaAngle;
                }
               
                currentAngle = (currentAngle + 180) % 360 - 180;
               
                const newRotation = Math.round(currentAngle);
                activeElement.dataset.rotation = newRotation;
                applyTransformations(activeElement);
               
                const indicator = activeElement.querySelector('.rotate-indicator');
                if (indicator) {
                    indicator.textContent = newRotation + '°';
                }
               
                if (activeElement.classList.contains('draggable-image')) {
                    imagesRef.child(activeElement.id).update({
                        rotation: newRotation
                    });
                }
            }
        }
       
        function endInteraction() {
            if (activeInteraction) {
                saveStateToHistory();
            }
            activeInteraction = null;
            activeElement = null;
            resizeDirection = null;
        }
       
        window.addEventListener('DOMContentLoaded', initApp);
        window.addEventListener('resize', setupViewport);
    </script>
</body>
