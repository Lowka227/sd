<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прозрачный холст - Текст без фона, звуки работают</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        body {
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        #controls {
            background: #1e2b6e;
            padding: 8px;
            z-index: 10000;
            flex-shrink: 0;
            border-bottom: 2px solid #ffd966;
        }
        .controls-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            background: white;
            padding: 5px 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        #thumbnails-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            flex: 1;
            min-height: 50px;
        }
        .thumbnail {
            position: relative;
            width: 45px;
            height: 45px;
            border: 2px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            background: #f0f0f0;
            flex-shrink: 0;
        }
        .thumbnail.selected { border-color: #ffd966; box-shadow: 0 0 0 2px #ffb347; }
        .thumbnail-hidden { opacity: 0.4; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-eye, .thumbnail-delete {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid white;
        }
        .thumbnail-eye { bottom: -4px; right: -4px; background: #4caf50; }
        .thumbnail-eye.hidden { background: #f44336; }
        .thumbnail-delete { top: -4px; right: -4px; background: #f44336; }
        .text-thumbnail, .widget-thumbnail, .sound-thumbnail {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        button {
            padding: 5px 12px;
            border: none;
            border-radius: 20px;
            background: #2a3f8a;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover { opacity: 0.9; }
        #canvas-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
            background: transparent;
        }
        .canvas-content {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #images-layer, #texts-layer, #widgets-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .draggable-image, .draggable-text, .draggable-widget {
            position: absolute;
            cursor: grab;
            pointer-events: auto;
        }
        .draggable-image:active, .draggable-text:active, .draggable-widget:active { cursor: grabbing; }
        .draggable-image { overflow: hidden; background: transparent; }
        .draggable-image img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        /* Текст без фона - полностью прозрачный */
        .draggable-text {
            background: transparent !important;
            padding: 4px 8px;
            border: none !important;
            white-space: pre-wrap;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .draggable-widget {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .draggable-widget iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
        }
        .selected { outline: 3px solid #ffd966; outline-offset: 2px; z-index: 999; }
        .locked { outline: 2px solid red !important; cursor: default !important; }
        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd966;
            border: 1px solid #1e2b6e;
            z-index: 20;
            opacity: 0;
            pointer-events: auto;
        }
        .rotate-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #4caf50;
            border: 1px solid white;
            z-index: 20;
            opacity: 0;
            cursor: pointer;
            top: -24px;
            right: -24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            border-radius: 50%;
        }
        .selected:not(.locked) .resize-handle,
        .selected:not(.locked) .rotate-corner { opacity: 1; }
        .resize-n { top: -5px; left: 50%; margin-left: -5px; cursor: n-resize; }
        .resize-ne { top: -5px; right: -5px; cursor: ne-resize; }
        .resize-e { top: 50%; right: -5px; margin-top: -5px; cursor: e-resize; }
        .resize-se { bottom: -5px; right: -5px; cursor: se-resize; }
        .resize-s { bottom: -5px; left: 50%; margin-left: -5px; cursor: s-resize; }
        .resize-sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .resize-w { top: 50%; left: -5px; margin-top: -5px; cursor: w-resize; }
        .resize-nw { top: -5px; left: -5px; cursor: nw-resize; }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 12px;
            z-index: 20000;
            color: white;
            width: 400px;
            max-width: 90vw;
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .close-btn { background: red; padding: 5px 10px; border-radius: 50%; cursor: pointer; }
        .crop-overlay {
            position: absolute;
            border: 2px dashed red;
            background: rgba(255,0,0,0.2);
            pointer-events: none;
            z-index: 1000;
        }
        .sound-controls-panel { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sound-progress { width: 100px; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; }
        .sound-progress-bar { height: 100%; background: #2a3f8a; width: 0%; }
    </style>
</head>
<body>
<div id="controls">
    <div class="controls-row">
        <button onclick="document.getElementById('file-input').click()">🖼 Изображение</button>
        <button id="add-text-btn">📝 Текст</button>
        <button id="add-sound-btn">🔊 Звук</button>
        <button id="add-widget-btn">🧩 Виджет</button>
        <button id="clear-btn">🗑 Очистить</button>
        <span id="status" style="margin-left:auto;">✅ Готово</span>
    </div>
    <div class="controls-row">
        <span>📦 Элементы:</span>
        <div id="thumbnails-container"><div id="thumbnails"></div></div>
    </div>
    <div id="image-controls" style="display:none;">
        <button id="hide-img-btn">👁 Скрыть</button>
        <button id="del-img-btn">🗑 Удалить</button>
        <button id="lock-img-btn">🔒 Закрепить</button>
        <button id="flip-h-btn">↔ Гориз</button>
        <button id="flip-v-btn">↕ Вертик</button>
        <button id="opacity-btn">🎨 Прозрачность</button>
        <button id="crop-img-btn" style="background:#ff9800;">✂ Обрезать</button>
    </div>
    <div id="text-controls" style="display:none;">
        <button id="hide-text-btn">👁 Скрыть</button>
        <button id="edit-text-btn">✏ Редактировать</button>
        <button id="del-text-btn">🗑 Удалить</button>
        <button id="lock-text-btn">🔒 Закрепить</button>
    </div>
    <div id="sound-controls" style="display:none;">
        <div class="sound-controls-panel">
            <button id="play-btn">▶ Воспроизвести</button>
            <button id="pause-btn">⏸ Пауза</button>
            <button id="stop-btn">⏹ Стоп</button>
            <div class="sound-progress"><div class="sound-progress-bar" id="sound-progress-bar"></div></div>
            <span>🔊</span>
            <input type="range" id="sound-volume" min="0" max="100" value="100" style="width:80px">
            <button id="del-sound-btn">🗑 Удалить</button>
        </div>
    </div>
    <div id="widget-controls" style="display:none;">
        <button id="hide-widget-btn">👁 Скрыть</button>
        <button id="del-widget-btn">🗑 Удалить</button>
        <button id="lock-widget-btn">🔒 Закрепить</button>
        <button id="reload-widget-btn">🔄 Обновить</button>
        <button id="edit-url-btn">✏ URL</button>
        <button id="widget-css-btn">🎨 CSS</button>
        <button id="crop-widget-btn" style="background:#ff9800;">✂ Обрезать</button>
    </div>
</div>
<div id="canvas-wrapper"><div class="canvas-content"><div id="images-layer"></div><div id="texts-layer"></div><div id="widgets-layer"></div></div></div>

<div id="text-modal" class="modal">
    <div class="modal-header"><h3>Текст (без фона)</h3><div class="close-btn" onclick="closeModal('text-modal')">×</div></div>
    <textarea id="text-value" rows="3" placeholder="Введите текст"></textarea>
    <select id="font-family"><option value="Arial">Arial</option><option value="'Comic Sans MS'">Comic Sans</option><option value="Georgia">Georgia</option><option value="Verdana">Verdana</option><option value="'Times New Roman'">Times New Roman</option></select>
    <input type="range" id="font-size" min="12" max="72" value="24">
    <input type="color" id="text-color" value="#000000">
    <button id="apply-text">Применить</button>
</div>

<div id="widget-modal" class="modal">
    <div class="modal-header"><h3>Добавить виджет</h3><div class="close-btn" onclick="closeModal('widget-modal')">×</div></div>
    <input type="text" id="widget-url" placeholder="https://example.com" value="https://www.youtube.com/embed/dQw4w9WgXcQ">
    <div style="display:flex; gap:8px;"><input type="number" id="widget-w" placeholder="Ширина" value="400" style="width:50%"><input type="number" id="widget-h" placeholder="Высота" value="300" style="width:50%"></div>
    <input type="text" id="widget-name" placeholder="Название">
    <textarea id="widget-css" rows="3" placeholder="CSS стили: border-radius: 15px; background: linear-gradient(135deg, #667eea, #764ba2);"></textarea>
    <button id="add-widget-submit" style="background:#4caf50;">➕ Добавить</button>
</div>

<div id="css-modal" class="modal">
    <div class="modal-header"><h3>CSS стили виджета</h3><div class="close-btn" onclick="closeModal('css-modal')">×</div></div>
    <textarea id="css-editor" rows="6" placeholder="border-radius: 15px; background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 10px 30px rgba(0,0,0,0.3);"></textarea>
    <button id="apply-css">Применить</button>
</div>

<div id="opacity-modal" class="modal">
    <div class="modal-header"><h3>Прозрачность изображения</h3><div class="close-btn" onclick="closeModal('opacity-modal')">×</div></div>
    <input type="range" id="opacity-value" min="0" max="100" value="100">
    <button id="apply-opacity">Применить</button>
</div>

<div id="crop-modal" class="modal">
    <div class="modal-header"><h3>Обрезка</h3><div class="close-btn" onclick="closeModal('crop-modal')">×</div></div>
    <p>1. Нажмите "Начать"</p>
    <p>2. Потяните за уголок элемента</p>
    <p>3. Нажмите "Применить"</p>
    <button id="crop-start" style="background:#4caf50;">🔪 Начать</button>
    <button id="crop-apply" style="background:#2196f3; margin-top:10px;">✅ Применить</button>
    <button id="crop-cancel" style="background:#f44336; margin-top:10px;">❌ Отмена</button>
</div>

<input type="file" id="file-input" accept="image/*">
<input type="file" id="sound-file" accept="audio/*">
<audio id="audio-player"></audio>

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNWDm3Rkvq4mV7Cvf5ckvZvDD5MNLDXoo",
        authDomain: "greenbackgroundapp.firebaseapp.com",
        databaseURL: "https://greenbackgroundapp-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "greenbackgroundapp",
        storageBucket: "greenbackgroundapp.appspot.com",
        messagingSenderId: "857271333291",
        appId: "1:857271333291:web:e754824268f37341c7e2ee"
    };
    firebase.initializeApp(firebaseConfig);
    
    const db = firebase.database();
    const imagesRef = db.ref('images');
    const textsRef = db.ref('texts');
    const soundsRef = db.ref('sounds');
    const widgetsRef = db.ref('widgets');
    
    let images = {}, texts = {}, sounds = {}, widgets = {};
    let selectedId = null, selectedType = null;
    let canvasSize = { w: 0, h: 0 };
    
    let dragEl = null, dragStartX = 0, dragStartY = 0, dragStartL = 0, dragStartT = 0, isDrag = false;
    let resizeEl = null, resizeDir = null, resizeStartX = 0, resizeStartY = 0, resizeStartW = 0, resizeStartH = 0, resizeStartL = 0, resizeStartT = 0, isResize = false;
    let cropMode = false, cropOverlay = null, cropElement = null, cropType = null, cropStartW = 0, cropStartH = 0;
    let mouseDown = false;
    
    // Аудио плеер
    let currentAudio = null;
    let audioUpdateInterval = null;
    
    function createId(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function updateCanvasSize() {
        const wrapper = document.getElementById('canvas-wrapper');
        if (wrapper) { canvasSize.w = wrapper.clientWidth; canvasSize.h = wrapper.clientHeight; }
    }
    
    // Обновление прогресса звука
    function updateSoundProgress() {
        const audio = document.getElementById('audio-player');
        const progressBar = document.getElementById('sound-progress-bar');
        if (audio && !audio.paused && audio.duration) {
            let percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
        }
    }
    
    document.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        
        if (isDrag && dragEl) {
            let newL = dragStartL + (e.clientX - dragStartX);
            let newT = dragStartT + (e.clientY - dragStartY);
            newL = Math.max(0, Math.min(newL, canvasSize.w - dragEl.offsetWidth));
            newT = Math.max(0, Math.min(newT, canvasSize.h - dragEl.offsetHeight));
            dragEl.style.left = newL + 'px';
            dragEl.style.top = newT + 'px';
            let id = dragEl.id;
            if (images[id]) imagesRef.child(id).update({ x: newL, y: newT });
            else if (texts[id]) textsRef.child(id).update({ x: newL, y: newT });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newL, y: newT });
        }
        
        if ((isResize || cropMode) && resizeEl) {
            let dx = e.clientX - resizeStartX;
            let dy = e.clientY - resizeStartY;
            
            if (cropMode && cropOverlay) {
                let newW = Math.max(30, cropStartW + dx);
                let newH = Math.max(30, cropStartH + dy);
                cropOverlay.style.width = newW + 'px';
                cropOverlay.style.height = newH + 'px';
            } else if (isResize) {
                let newW = resizeStartW, newH = resizeStartH, newL = resizeStartL, newT = resizeStartT;
                switch(resizeDir) {
                    case 'e': newW = Math.max(50, resizeStartW + dx); break;
                    case 'w': newW = Math.max(50, resizeStartW - dx); newL = resizeStartL + (resizeStartW - newW); break;
                    case 's': newH = Math.max(50, resizeStartH + dy); break;
                    case 'n': newH = Math.max(50, resizeStartH - dy); newT = resizeStartT + (resizeStartH - newH); break;
                    case 'se': newW = Math.max(50, resizeStartW + dx); newH = Math.max(50, resizeStartH + dy); break;
                    case 'sw': newW = Math.max(50, resizeStartW - dx); newH = Math.max(50, resizeStartH + dy); newL = resizeStartL + (resizeStartW - newW); break;
                    case 'ne': newW = Math.max(50, resizeStartW + dx); newH = Math.max(50, resizeStartH - dy); newT = resizeStartT + (resizeStartH - newH); break;
                    case 'nw': newW = Math.max(50, resizeStartW - dx); newH = Math.max(50, resizeStartH - dy); newL = resizeStartL + (resizeStartW - newW); newT = resizeStartT + (resizeStartH - newH); break;
                }
                newL = Math.max(0, Math.min(newL, canvasSize.w - newW));
                newT = Math.max(0, Math.min(newT, canvasSize.h - newH));
                resizeEl.style.width = newW + 'px';
                resizeEl.style.height = newH + 'px';
                resizeEl.style.left = newL + 'px';
                resizeEl.style.top = newT + 'px';
            }
        }
    });
    
    document.addEventListener('mouseup', () => {
        if (!mouseDown) return;
        mouseDown = false;
        
        if (isResize && resizeEl && !cropMode) {
            let id = resizeEl.id;
            let newL = parseFloat(resizeEl.style.left);
            let newT = parseFloat(resizeEl.style.top);
            let newW = parseFloat(resizeEl.style.width);
            let newH = parseFloat(resizeEl.style.height);
            if (images[id]) imagesRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
        }
        
        isDrag = false;
        isResize = false;
        dragEl = null;
        resizeEl = null;
    });
    
    function makeDraggable(el) {
        el.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('resize-handle') || e.target.classList.contains('rotate-corner')) return;
            if (el.classList.contains('locked')) return;
            e.preventDefault();
            mouseDown = true;
            isDrag = true;
            dragEl = el;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartL = parseFloat(el.style.left) || 0;
            dragStartT = parseFloat(el.style.top) || 0;
            
            let id = el.id;
            if (id.startsWith('img')) selectElement(id, 'image');
            else if (id.startsWith('text')) selectElement(id, 'text');
            else if (id.startsWith('widget')) selectElement(id, 'widget');
        });
    }
    
    function addResizeHandles(el) {
        const dirs = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
        dirs.forEach(dir => {
            let handle = document.createElement('div');
            handle.className = `resize-handle resize-${dir}`;
            handle.addEventListener('mousedown', (e) => {
                if (el.classList.contains('locked')) return;
                e.stopPropagation();
                e.preventDefault();
                mouseDown = true;
                isResize = true;
                resizeEl = el;
                resizeDir = dir;
                resizeStartX = e.clientX;
                resizeStartY = e.clientY;
                resizeStartW = el.offsetWidth;
                resizeStartH = el.offsetHeight;
                resizeStartL = parseFloat(el.style.left) || 0;
                resizeStartT = parseFloat(el.style.top) || 0;
                
                if (cropMode && cropOverlay) {
                    cropStartW = resizeStartW;
                    cropStartH = resizeStartH;
                }
            });
            el.appendChild(handle);
        });
    }
    
    function addRotateHandle(el) {
        let rot = document.createElement('div');
        rot.className = 'rotate-corner';
        rot.innerHTML = '↻';
        rot.addEventListener('mousedown', (e) => {
            if (el.classList.contains('locked')) return;
            e.stopPropagation();
            e.preventDefault();
            mouseDown = true;
            let startX = e.clientX, startY = e.clientY;
            let rect = el.getBoundingClientRect();
            let centerX = rect.left + rect.width/2, centerY = rect.top + rect.height/2;
            let startAngle = Math.atan2(startY - centerY, startX - centerX) * 180 / Math.PI;
            let currentRot = parseFloat(el.dataset.rotation) || 0;
            
            function onMove(me) {
                if (!mouseDown) return;
                let angle = Math.atan2(me.clientY - centerY, me.clientX - centerX) * 180 / Math.PI;
                let newRot = currentRot + (angle - startAngle);
                el.dataset.rotation = newRot;
                el.style.transform = `rotate(${newRot}deg)`;
                let id = el.id;
                if (images[id]) imagesRef.child(id).update({ rotation: newRot });
            }
            function onUp() {
                mouseDown = false;
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        el.appendChild(rot);
    }
    
    function selectElement(id, type) {
        deselectAll();
        selectedId = id;
        selectedType = type;
        let el = document.getElementById(id);
        if (el) el.classList.add('selected');
        document.getElementById('image-controls').style.display = type === 'image' ? 'flex' : 'none';
        document.getElementById('text-controls').style.display = type === 'text' ? 'flex' : 'none';
        document.getElementById('sound-controls').style.display = type === 'sound' ? 'flex' : 'none';
        document.getElementById('widget-controls').style.display = type === 'widget' ? 'flex' : 'none';
        updateThumbnails();
    }
    
    function deselectAll() {
        document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        selectedId = null;
        selectedType = null;
        document.getElementById('image-controls').style.display = 'none';
        document.getElementById('text-controls').style.display = 'none';
        document.getElementById('sound-controls').style.display = 'none';
        document.getElementById('widget-controls').style.display = 'none';
        
        // Останавливаем звук при снятии выделения
        if (currentAudio) {
            currentAudio.pause();
            if (audioUpdateInterval) clearInterval(audioUpdateInterval);
        }
    }
    
    function updateThumbnails() {
        let container = document.getElementById('thumbnails');
        container.innerHTML = '';
        for (let id in images) addThumb(id, 'image', images[id].src);
        for (let id in texts) addThumb(id, 'text', texts[id].text.substring(0,4));
        for (let id in widgets) addThumb(id, 'widget', '🧩');
        for (let id in sounds) addThumb(id, 'sound', '🔊');
    }
    
    function addThumb(id, type, preview) {
        let thumb = document.createElement('div');
        thumb.className = 'thumbnail';
        let data = images[id] || texts[id] || widgets[id] || sounds[id];
        if (data && data.display === 'none') thumb.classList.add('thumbnail-hidden');
        if (selectedId === id) thumb.classList.add('selected');
        
        let content = document.createElement('div');
        if (type === 'image') {
            let img = document.createElement('img');
            img.src = preview;
            content.appendChild(img);
        } else {
            content.className = type + '-thumbnail';
            content.textContent = preview;
        }
        thumb.appendChild(content);
        
        let eye = document.createElement('div');
        eye.className = 'thumbnail-eye' + (data && data.display === 'none' ? ' hidden' : '');
        eye.textContent = '👁';
        eye.onclick = (e) => { e.stopPropagation(); toggleVisibility(id, type); };
        thumb.appendChild(eye);
        
        let del = document.createElement('div');
        del.className = 'thumbnail-delete';
        del.textContent = '✕';
        del.onclick = (e) => { e.stopPropagation(); deleteElement(id, type); };
        thumb.appendChild(del);
        
        thumb.onclick = () => { selectElement(id, type); };
        document.getElementById('thumbnails').appendChild(thumb);
    }
    
    function toggleVisibility(id, type) {
        let el = document.getElementById(id);
        if (!el) return;
        let newDisplay = el.style.display === 'none' ? 'block' : 'none';
        el.style.display = newDisplay;
        if (type === 'image') imagesRef.child(id).update({ display: newDisplay });
        else if (type === 'text') textsRef.child(id).update({ display: newDisplay });
        else if (type === 'widget') widgetsRef.child(id).update({ display: newDisplay });
        else if (type === 'sound') soundsRef.child(id).update({ display: newDisplay });
        updateThumbnails();
    }
    
    function deleteElement(id, type) {
        if (type === 'image') imagesRef.child(id).remove();
        else if (type === 'text') textsRef.child(id).remove();
        else if (type === 'widget') widgetsRef.child(id).remove();
        else if (type === 'sound') soundsRef.child(id).remove();
        if (selectedId === id) deselectAll();
    }
    
    function syncElements() {
        updateCanvasSize();
        
        for (let id in images) {
            let d = images[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-image';
                let img = document.createElement('img');
                img.src = d.src;
                el.appendChild(img);
                document.getElementById('images-layer').appendChild(el);
                addResizeHandles(el);
                addRotateHandle(el);
                makeDraggable(el);
            }
            el.style.left = d.x + 'px';
            el.style.top = d.y + 'px';
            el.style.width = d.width + 'px';
            el.style.height = d.height + 'px';
            el.style.opacity = d.opacity || 1;
            el.style.filter = `brightness(${d.brightness || 100}%)`;
            el.style.display = d.display === 'none' ? 'none' : 'block';
            if (d.locked) el.classList.add('locked');
            else el.classList.remove('locked');
            if (d.rotation) { el.dataset.rotation = d.rotation; el.style.transform = `rotate(${d.rotation}deg)`; }
            if (d.flipHorizontal) el.style.transform += ' scaleX(-1)';
            if (d.flipVertical) el.style.transform += ' scaleY(-1)';
        }
        
        for (let id in texts) {
            let d = texts[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-text';
                el.textContent = d.text;
                document.getElementById('texts-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el);
                el.ondblclick = () => openTextEditor(id);
            }
            el.textContent = d.text;
            el.style.left = d.x + 'px';
            el.style.top = d.y + 'px';
            el.style.fontSize = d.fontSize + 'px';
            el.style.color = d.color;
            el.style.fontFamily = d.fontFamily;
            el.style.display = d.display === 'none' ? 'none' : 'block';
            el.style.background = 'transparent';
            el.style.border = 'none';
            el.style.padding = '4px 8px';
            el.style.textShadow = '1px 1px 2px rgba(0,0,0,0.5)';
            if (d.locked) el.classList.add('locked');
            else el.classList.remove('locked');
        }
        
        for (let id in widgets) {
            let d = widgets[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-widget';
                el.innerHTML = `<iframe src="${d.url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" style="width:100%; height:100%; border:none;"></iframe>`;
                document.getElementById('widgets-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el);
            }
            el.style.left = d.x + 'px';
            el.style.top = d.y + 'px';
            el.style.width = d.width + 'px';
            el.style.height = d.height + 'px';
            el.style.opacity = d.opacity || 1;
            el.style.display = d.display === 'none' ? 'none' : 'block';
            if (d.customCss) {
                let oldCss = el.style.cssText;
                el.style.cssText = d.customCss + ';' + oldCss;
            }
            if (d.locked) el.classList.add('locked');
            else el.classList.remove('locked');
        }
        updateThumbnails();
    }
    
    function openTextEditor(id) {
        let d = texts[id];
        document.getElementById('text-value').value = d.text;
        document.getElementById('font-size').value = d.fontSize;
        document.getElementById('text-color').value = d.color;
        document.getElementById('font-family').value = d.fontFamily;
        document.getElementById('text-modal').style.display = 'block';
        document.getElementById('apply-text').onclick = () => {
            textsRef.child(id).update({
                text: document.getElementById('text-value').value,
                fontSize: parseInt(document.getElementById('font-size').value),
                color: document.getElementById('text-color').value,
                fontFamily: document.getElementById('font-family').value
            });
            closeModal('text-modal');
        };
    }
    
    // Звук: воспроизведение выбранного звука
    function playSelectedSound() {
        if (selectedId && sounds[selectedId]) {
            let audio = document.getElementById('audio-player');
            audio.src = sounds[selectedId].src;
            audio.volume = (sounds[selectedId].volume || 100) / 100;
            audio.play();
            currentAudio = audio;
            
            if (audioUpdateInterval) clearInterval(audioUpdateInterval);
            audioUpdateInterval = setInterval(() => {
                if (audio.paused || audio.ended) {
                    document.getElementById('sound-progress-bar').style.width = '0%';
                    if (audio.ended) clearInterval(audioUpdateInterval);
                } else {
                    let percent = (audio.currentTime / audio.duration) * 100;
                    document.getElementById('sound-progress-bar').style.width = percent + '%';
                }
            }, 100);
        }
    }
    
    imagesRef.on('value', s => { images = s.val() || {}; syncElements(); });
    textsRef.on('value', s => { texts = s.val() || {}; syncElements(); });
    widgetsRef.on('value', s => { widgets = s.val() || {}; syncElements(); });
    soundsRef.on('value', s => { sounds = s.val() || {}; updateThumbnails(); });
    
    document.getElementById('add-text-btn').onclick = () => {
        document.getElementById('text-value').value = '';
        document.getElementById('font-size').value = 24;
        document.getElementById('text-color').value = '#000000';
        document.getElementById('text-modal').style.display = 'block';
        document.getElementById('apply-text').onclick = () => {
            let txt = document.getElementById('text-value').value.trim();
            if (txt) {
                let id = createId('text');
                textsRef.child(id).set({
                    id, text: txt, x: 50, y: 50, fontSize: 24, color: '#000000',
                    fontFamily: 'Arial', display: 'block', locked: false
                });
            }
            closeModal('text-modal');
        };
    };
    
    document.getElementById('add-widget-btn').onclick = () => document.getElementById('widget-modal').style.display = 'block';
    document.getElementById('add-widget-submit').onclick = () => {
        let url = document.getElementById('widget-url').value.trim();
        if (!url) return alert('Введите URL');
        let finalUrl = url.startsWith('http') ? url : 'https://' + url;
        let id = createId('widget');
        widgetsRef.child(id).set({
            id, url: finalUrl, name: document.getElementById('widget-name').value || 'Виджет',
            x: 50, y: 50, width: parseInt(document.getElementById('widget-w').value) || 400,
            height: parseInt(document.getElementById('widget-h').value) || 300,
            opacity: 1, locked: false, display: 'block', customCss: document.getElementById('widget-css').value
        });
        closeModal('widget-modal');
    };
    
    document.getElementById('file-input').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let img = new Image();
                img.onload = () => {
                    let id = createId('img');
                    imagesRef.child(id).set({
                        id, src: ev.target.result, x: 50, y: 50,
                        width: Math.min(400, img.width), height: Math.min(300, img.height),
                        opacity: 1, brightness: 100, display: 'block', locked: false
                    });
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        }
    };
    
    document.getElementById('add-sound-btn').onclick = () => document.getElementById('sound-file').click();
    document.getElementById('sound-file').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let id = createId('sound');
                soundsRef.child(id).set({ id, src: ev.target.result, name: f.name, volume: 100, display: 'block' });
            };
            r.readAsDataURL(f);
        }
    };
    
    document.getElementById('clear-btn').onclick = () => { if(confirm('Очистить всё?')) { imagesRef.remove(); textsRef.remove(); soundsRef.remove(); widgetsRef.remove(); } };
    document.getElementById('del-img-btn').onclick = () => { if(selectedId && selectedType === 'image') imagesRef.child(selectedId).remove(); deselectAll(); };
    document.getElementById('del-text-btn').onclick = () => { if(selectedId && selectedType === 'text') textsRef.child(selectedId).remove(); deselectAll(); };
    document.getElementById('del-widget-btn').onclick = () => { if(selectedId && selectedType === 'widget') widgetsRef.child(selectedId).remove(); deselectAll(); };
    document.getElementById('del-sound-btn').onclick = () => { if(selectedId && selectedType === 'sound') soundsRef.child(selectedId).remove(); deselectAll(); };
    document.getElementById('hide-img-btn').onclick = () => { if(selectedId) toggleVisibility(selectedId, 'image'); };
    document.getElementById('hide-text-btn').onclick = () => { if(selectedId) toggleVisibility(selectedId, 'text'); };
    document.getElementById('hide-widget-btn').onclick = () => { if(selectedId) toggleVisibility(selectedId, 'widget'); };
    
    document.getElementById('lock-img-btn').onclick = () => { if(selectedId && images[selectedId]) { let el = document.getElementById(selectedId); let locked = !el.classList.contains('locked'); if (locked) el.classList.add('locked'); else el.classList.remove('locked'); imagesRef.child(selectedId).update({ locked }); } };
    document.getElementById('lock-text-btn').onclick = () => { if(selectedId && texts[selectedId]) { let el = document.getElementById(selectedId); let locked = !el.classList.contains('locked'); if (locked) el.classList.add('locked'); else el.classList.remove('locked'); textsRef.child(selectedId).update({ locked }); } };
    document.getElementById('lock-widget-btn').onclick = () => { if(selectedId && widgets[selectedId]) { let el = document.getElementById(selectedId); let locked = !el.classList.contains('locked'); if (locked) el.classList.add('locked'); else el.classList.remove('locked'); widgetsRef.child(selectedId).update({ locked }); } };
    
    document.getElementById('flip-h-btn').onclick = () => { if(selectedId && images[selectedId]) { let el = document.getElementById(selectedId); let val = el.style.transform.includes('scaleX(-1)'); el.style.transform = val ? el.style.transform.replace('scaleX(-1)', '') : (el.style.transform + ' scaleX(-1)'); imagesRef.child(selectedId).update({ flipHorizontal: !val }); } };
    document.getElementById('flip-v-btn').onclick = () => { if(selectedId && images[selectedId]) { let el = document.getElementById(selectedId); let val = el.style.transform.includes('scaleY(-1)'); el.style.transform = val ? el.style.transform.replace('scaleY(-1)', '') : (el.style.transform + ' scaleY(-1)'); imagesRef.child(selectedId).update({ flipVertical: !val }); } };
    
    document.getElementById('opacity-btn').onclick = () => { if(selectedId && images[selectedId]) { document.getElementById('opacity-value').value = (images[selectedId].opacity || 1) * 100; document.getElementById('opacity-modal').style.display = 'block'; } };
    document.getElementById('apply-opacity').onclick = () => { if(selectedId && images[selectedId]) { imagesRef.child(selectedId).update({ opacity: document.getElementById('opacity-value').value / 100 }); closeModal('opacity-modal'); } };
    
    document.getElementById('reload-widget-btn').onclick = () => { if(selectedId && widgets[selectedId]) { let el = document.getElementById(selectedId); let iframe = el?.querySelector('iframe'); if(iframe) iframe.src = iframe.src; } };
    document.getElementById('edit-url-btn').onclick = () => { if(selectedId && widgets[selectedId]) { let newUrl = prompt('Новый URL:', widgets[selectedId].url); if(newUrl) { let finalUrl = newUrl.startsWith('http') ? newUrl : 'https://' + newUrl; widgetsRef.child(selectedId).update({ url: finalUrl }); let el = document.getElementById(selectedId); if(el) { let iframe = el.querySelector('iframe'); if(iframe) iframe.src = finalUrl; } } } };
    document.getElementById('widget-css-btn').onclick = () => { if(selectedId && widgets[selectedId]) { document.getElementById('css-editor').value = widgets[selectedId].customCss || ''; document.getElementById('css-modal').style.display = 'block'; } };
    document.getElementById('apply-css').onclick = () => { if(selectedId && widgets[selectedId]) { let css = document.getElementById('css-editor').value; widgetsRef.child(selectedId).update({ customCss: css }); let el = document.getElementById(selectedId); if(el) { el.style.cssText = css + ';' + el.style.cssText; } closeModal('css-modal'); } };
    document.getElementById('edit-text-btn').onclick = () => { if(selectedId && texts[selectedId]) openTextEditor(selectedId); };
    
    // Звук кнопки
    document.getElementById('play-btn').onclick = () => { playSelectedSound(); };
    document.getElementById('pause-btn').onclick = () => { let audio = document.getElementById('audio-player'); audio.pause(); if (audioUpdateInterval) clearInterval(audioUpdateInterval); };
    document.getElementById('stop-btn').onclick = () => { let audio = document.getElementById('audio-player'); audio.pause(); audio.currentTime = 0; document.getElementById('sound-progress-bar').style.width = '0%'; if (audioUpdateInterval) clearInterval(audioUpdateInterval); };
    document.getElementById('sound-volume').oninput = (e) => { if(selectedId && sounds[selectedId]) { soundsRef.child(selectedId).update({ volume: e.target.value }); let audio = document.getElementById('audio-player'); if (audio.src === sounds[selectedId].src) audio.volume = e.target.value / 100; } };
    
    // Обрезка
    document.getElementById('crop-img-btn').onclick = () => { if(selectedId && images[selectedId]) { cropType = 'image'; cropElement = document.getElementById(selectedId); document.getElementById('crop-modal').style.display = 'block'; } };
    document.getElementById('crop-widget-btn').onclick = () => { if(selectedId && widgets[selectedId]) { cropType = 'widget'; cropElement = document.getElementById(selectedId); document.getElementById('crop-modal').style.display = 'block'; } };
    document.getElementById('crop-start').onclick = () => {
        if (cropElement) {
            cropMode = true;
            if (cropOverlay) cropOverlay.remove();
            cropOverlay = document.createElement('div');
            cropOverlay.className = 'crop-overlay';
            let left = parseFloat(cropElement.style.left) || 0;
            let top = parseFloat(cropElement.style.top) || 0;
            let w = cropElement.offsetWidth;
            let h = cropElement.offsetHeight;
            cropOverlay.style.left = left + 'px';
            cropOverlay.style.top = top + 'px';
            cropOverlay.style.width = w + 'px';
            cropOverlay.style.height = h + 'px';
            cropElement.parentElement.appendChild(cropOverlay);
            cropStartW = w; cropStartH = h;
            alert('Тяните за уголок элемента, затем нажмите "Применить"');
        }
        closeModal('crop-modal');
    };
    document.getElementById('crop-apply').onclick = () => {
        if (cropOverlay && cropElement) {
            let newW = parseFloat(cropOverlay.style.width);
            let newH = parseFloat(cropOverlay.style.height);
            if (newW > 20 && newH > 20) {
                if (cropType === 'image') {
                    let img = cropElement.querySelector('img');
                    let canvas = document.createElement('canvas');
                    canvas.width = newW;
                    canvas.height = newH;
                    let ctx = canvas.getContext('2d');
                    let tempImg = new Image();
                    tempImg.onload = () => {
                        ctx.drawImage(tempImg, 0, 0, newW, newH);
                        imagesRef.child(cropElement.id).update({ src: canvas.toDataURL(), width: newW, height: newH });
                        alert('Изображение обрезано');
                    };
                    tempImg.src = images[cropElement.id].src;
                } else if (cropType === 'widget') {
                    widgetsRef.child(cropElement.id).update({ width: newW, height: newH });
                    alert('Виджет обрезан');
                }
            }
            cropOverlay.remove();
            cropOverlay = null;
            cropMode = false;
        }
        closeModal('crop-modal');
    };
    document.getElementById('crop-cancel').onclick = () => {
        if (cropOverlay) cropOverlay.remove();
        cropOverlay = null;
        cropMode = false;
        closeModal('crop-modal');
    };
    
    updateCanvasSize();
    window.addEventListener('resize', () => { updateCanvasSize(); syncElements(); });
    setTimeout(syncElements, 100);
</script>
</body>
</html>
