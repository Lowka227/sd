<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Прозрачный холст - Полнофункциональный редактор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', Arial, sans-serif;
            background: transparent !important;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        #controls {
            background: linear-gradient(135deg, #1e2b6e 0%, #2a3f8a 100%);
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10000;
            width: 100%;
            border-bottom: 2px solid #ffd966;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }
        
        .controls-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 12px;
            border-left: 4px solid #ffd966;
        }
        
        #thumbnails-container {
            display: flex;
            align-items: center;
            overflow-x: auto;
            height: 48px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            padding: 4px 8px;
            flex: 1;
            min-width: 160px;
        }
        
        #thumbnails {
            display: flex;
            gap: 8px;
        }
        
        .thumbnail {
            position: relative;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: all 0.15s ease;
        }
        
        .thumbnail:hover {
            transform: scale(1.05);
            border-color: #ffd966;
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .text-thumbnail, .sound-thumbnail, .widget-thumbnail {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
            text-align: center;
            width: 100%;
            height: 100%;
        }
        
        .sound-thumbnail { background: #e3f2fd; }
        .widget-thumbnail { background: #e8f5e9; color: #2e7d32; font-weight: bold; }
        
        .thumbnail.selected {
            border-color: #ffd966;
            box-shadow: 0 0 0 2px #ffb347;
        }
        
        .thumbnail-hidden { opacity: 0.5; }
        
        .thumbnail-eye {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4caf50;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
            border: 1px solid white;
        }
        
        .thumbnail-eye.hidden { background: #f44336; }
        
        .thumbnail-delete {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f44336;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
            border: 1px solid white;
        }
        
        #image-controls, #text-controls, #sound-controls, #widget-controls {
            display: none;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.98);
            padding: 4px 10px;
            border-radius: 12px;
            border-left: 4px solid #ffd966;
            flex-wrap: wrap;
        }
        
        .panel-title {
            font-weight: bold;
            color: #1e2b6e;
            margin-right: 6px;
            font-size: 11px;
        }
        
        #canvas-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: auto;
            background: transparent !important;
            min-height: 0;
        }
        
        .canvas-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent !important;
        }
        
        #images-layer, #texts-layer, #widgets-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #images-layer { z-index: 2; }
        #texts-layer { z-index: 3; }
        #widgets-layer { z-index: 4; }
        
        .draggable-image, .draggable-text, .draggable-widget {
            position: absolute;
            cursor: grab;
            touch-action: none;
            pointer-events: auto;
            box-sizing: border-box;
            transform-origin: center center;
        }
        
        .draggable-image:active, .draggable-text:active, .draggable-widget:active {
            cursor: grabbing;
        }
        
        .draggable-image {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .draggable-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
        }
        
        .draggable-text {
            background: rgba(255, 255, 240, 0.95);
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.15);
            white-space: pre-wrap;
            word-break: break-word;
            min-width: 50px;
            min-height: 40px;
            cursor: grab;
        }
        
        .draggable-text:active {
            cursor: grabbing;
        }
        
        .draggable-widget {
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 1px solid #4caf50;
            display: flex;
            flex-direction: column;
            cursor: grab;
        }
        
        .draggable-widget:active {
            cursor: grabbing;
        }
        
        .draggable-widget iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
            background: white;
        }
        
        .widget-error {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff3e0;
            color: #e65100;
            padding: 10px;
            text-align: center;
            font-size: 12px;
        }
        
        .selected {
            outline: 3px solid #ffd966;
            outline-offset: 2px;
            z-index: 999 !important;
        }
        
        .locked {
            outline: 2px solid #ff4444 !important;
            cursor: default !important;
        }
        
        .locked:active {
            cursor: default !important;
        }
        
        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffd966;
            border: 2px solid #1e2b6e;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: auto;
        }
        
        .rotate-corner {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #4caf50;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            cursor: grab;
            top: -28px;
            right: -28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            pointer-events: auto;
        }
        
        .rotate-corner:active {
            cursor: grabbing;
        }
        
        .rotate-corner::after { content: "↻"; }
        
        .resize-n { top: -6px; left: 50%; margin-left: -6px; cursor: n-resize; }
        .resize-ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-e { top: 50%; right: -6px; margin-top: -6px; cursor: e-resize; }
        .resize-se { bottom: -6px; right: -6px; cursor: se-resize; }
        .resize-s { bottom: -6px; left: 50%; margin-left: -6px; cursor: s-resize; }
        .resize-sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-w { top: 50%; left: -6px; margin-top: -6px; cursor: w-resize; }
        .resize-nw { top: -6px; left: -6px; cursor: nw-resize; }
        
        .selected:not(.locked) .resize-handle,
        .selected:not(.locked) .rotate-corner {
            opacity: 1;
        }
        
        button {
            padding: 5px 12px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(135deg, #2a3f8a, #1e2b6e);
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        
        button:hover { transform: translateY(-1px); filter: brightness(1.05); }
        button:active { transform: translateY(0); }
        
        #file-input, #sound-input { display: none; }
        
        #status {
            margin-left: auto;
            font-size: 11px;
            color: #2e7d32;
            background: #e8f5e9;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: bold;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            z-index: 20000;
            border: 1px solid #ffd966;
            color: white;
            width: 400px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .close-btn {
            background: #f44336;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }
        
        textarea, input, select {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            border: none;
            padding: 8px;
            font-size: 12px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        
        .widgets-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .widgets-tab {
            background: #444;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            color: white;
        }
        
        .widgets-tab.active {
            background: #ffd966;
            color: #1e2b6e;
        }
        
        .widgets-content {
            display: none;
        }
        
        .widgets-content.active {
            display: block;
        }
        
        .quick-widget-btn {
            background: #4caf50;
            padding: 10px;
            margin: 8px 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
        }
        
        .url-hint {
            font-size: 11px;
            color: #ccc;
            margin-top: 5px;
            text-align: center;
        }
        
        .saved-widget-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            align-items: center;
        }
        
        .sound-visualization {
            width: 100px;
            height: 24px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .sound-progress {
            height: 100%;
            background: #2a3f8a;
            width: 0%;
        }
        
        .volume-slider {
            width: 70px;
        }
        
        @media (max-width: 700px) {
            .controls-row { gap: 5px; padding: 4px 6px; }
            button { padding: 4px 8px; font-size: 10px; }
            .thumbnail { width: 35px; height: 35px; }
            .resize-handle { width: 10px; height: 10px; }
        }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNWDm3Rkvq4mV7Cvf5ckvZvDD5MNLDXoo",
        authDomain: "greenbackgroundapp.firebaseapp.com",
        databaseURL: "https://greenbackgroundapp-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "greenbackgroundapp",

        messagingSenderId: "857271333291",
        appId: "1:857271333291:web:e754824268f37341c7e2ee"
    };
    firebase.initializeApp(firebaseConfig);
    
    const db = firebase.database();
    const imagesRef = db.ref('images');
    const textsRef = db.ref('texts');
    const soundsRef = db.ref('sounds');
    const widgetsRef = db.ref('widgets');
    const savedWidgetsRef = db.ref('savedWidgets');
    
    let images = {}, texts = {}, sounds = {}, widgets = {}, savedWidgets = {};
    let selectedImageId = null, selectedTextId = null, selectedSoundId = null, selectedWidgetId = null;
    let dragState = { active: false, element: null, startX: 0, startY: 0, startLeft: 0, startTop: 0, type: null };
    let canvasRect = { width: 0, height: 0 };
    
    function createId(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function updateCanvasSize() {
        const wrapper = document.getElementById('canvas-wrapper');
        if (wrapper) {
            canvasRect.width = wrapper.clientWidth;
            canvasRect.height = wrapper.clientHeight;
        }
    }
    
    function applyTransform(el) {
        let transform = '';
        let rot = el.dataset.rotation || 0;
        if (rot != 0) transform += `rotate(${rot}deg) `;
        if (el.dataset.flipH === 'true') transform += 'scaleX(-1) ';
        if (el.dataset.flipV === 'true') transform += 'scaleY(-1) ';
        el.style.transform = transform.trim();
    }
    
    function makeDraggable(el, type) {
        el.addEventListener('mousedown', onDragStart);
        el.addEventListener('touchstart', onDragStart, { passive: false });
        
        function onDragStart(e) {
            if (e.target.classList.contains('resize-handle') || e.target.classList.contains('rotate-corner')) return;
            if (el.classList.contains('locked')) return;
            e.preventDefault();
            e.stopPropagation();
            
            if (type === 'image') selectImage(el.id);
            else if (type === 'text') selectText(el.id);
            else if (type === 'widget') selectWidget(el.id);
            
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            dragState = {
                active: true,
                element: el,
                startX: clientX,
                startY: clientY,
                startLeft: parseFloat(el.style.left) || 0,
                startTop: parseFloat(el.style.top) || 0,
                type: type
            };
        }
        
        function onDragMove(e) {
            if (!dragState.active) return;
            e.preventDefault();
            
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let deltaX = clientX - dragState.startX;
            let deltaY = clientY - dragState.startY;
            let newLeft = dragState.startLeft + deltaX;
            let newTop = dragState.startTop + deltaY;
            
            newLeft = Math.max(0, Math.min(newLeft, canvasRect.width - dragState.element.offsetWidth));
            newTop = Math.max(0, Math.min(newTop, canvasRect.height - dragState.element.offsetHeight));
            
            dragState.element.style.left = newLeft + 'px';
            dragState.element.style.top = newTop + 'px';
            
            const id = dragState.element.id;
            if (images[id]) imagesRef.child(id).update({ x: newLeft, y: newTop });
            else if (texts[id]) textsRef.child(id).update({ x: newLeft, y: newTop });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newLeft, y: newTop });
        }
        
        function onDragEnd() {
            dragState.active = false;
            dragState.element = null;
        }
        
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);
    }
    
    function addResizeHandles(el) {
        const dirs = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
        dirs.forEach(dir => {
            let handle = document.createElement('div');
            handle.className = `resize-handle resize-${dir}`;
            handle.addEventListener('mousedown', (e) => startResize(e, el, dir));
            handle.addEventListener('touchstart', (e) => startResize(e, el, dir), { passive: false });
            el.appendChild(handle);
        });
    }
    
    function startResize(e, el, dir) {
        if (el.classList.contains('locked')) return;
        e.stopPropagation();
        e.preventDefault();
        
        let startX = e.clientX || e.touches[0].clientX;
        let startY = e.clientY || e.touches[0].clientY;
        let startW = el.offsetWidth;
        let startH = el.offsetHeight;
        let startL = parseFloat(el.style.left) || 0;
        let startT = parseFloat(el.style.top) || 0;
        
        function onResize(moveEv) {
            let currentX = moveEv.clientX || moveEv.touches[0].clientX;
            let currentY = moveEv.clientY || moveEv.touches[0].clientY;
            let dx = currentX - startX;
            let dy = currentY - startY;
            let newW = startW, newH = startH, newL = startL, newT = startT;
            
            switch(dir) {
                case 'e': newW = Math.max(50, startW + dx); break;
                case 'w': newW = Math.max(50, startW - dx); newL = startL + (startW - newW); break;
                case 's': newH = Math.max(50, startH + dy); break;
                case 'n': newH = Math.max(50, startH - dy); newT = startT + (startH - newH); break;
                case 'se': newW = Math.max(50, startW + dx); newH = Math.max(50, startH + dy); break;
                case 'sw': newW = Math.max(50, startW - dx); newH = Math.max(50, startH + dy); newL = startL + (startW - newW); break;
                case 'ne': newW = Math.max(50, startW + dx); newH = Math.max(50, startH - dy); newT = startT + (startH - newH); break;
                case 'nw': newW = Math.max(50, startW - dx); newH = Math.max(50, startH - dy); newL = startL + (startW - newW); newT = startT + (startH - newH); break;
            }
            
            newL = Math.max(0, Math.min(newL, canvasRect.width - newW));
            newT = Math.max(0, Math.min(newT, canvasRect.height - newH));
            
            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
            el.style.left = newL + 'px';
            el.style.top = newT + 'px';
            
            const id = el.id;
            if (images[id]) imagesRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
            else if (widgets[id]) widgetsRef.child(id).update({ x: newL, y: newT, width: newW, height: newH });
        }
        
        function stopResize() {
            document.removeEventListener('mousemove', onResize);
            document.removeEventListener('mouseup', stopResize);
            document.removeEventListener('touchmove', onResize);
            document.removeEventListener('touchend', stopResize);
        }
        
        document.addEventListener('mousemove', onResize);
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchmove', onResize, { passive: false });
        document.addEventListener('touchend', stopResize);
    }
    
    function addRotateHandle(el) {
        let rot = document.createElement('div');
        rot.className = 'rotate-corner';
        rot.addEventListener('mousedown', (e) => startRotate(e, el));
        rot.addEventListener('touchstart', (e) => startRotate(e, el), { passive: false });
        el.appendChild(rot);
    }
    
    function startRotate(e, el) {
        if (el.classList.contains('locked')) return;
        e.stopPropagation();
        e.preventDefault();
        
        let startX = e.clientX || e.touches[0].clientX;
        let startY = e.clientY || e.touches[0].clientY;
        let rect = el.getBoundingClientRect();
        let centerX = rect.left + rect.width / 2;
        let centerY = rect.top + rect.height / 2;
        let startAngle = Math.atan2(startY - centerY, startX - centerX) * 180 / Math.PI;
        let currentRot = parseFloat(el.dataset.rotation) || 0;
        
        function onRotate(moveEv) {
            let currX = moveEv.clientX || moveEv.touches[0].clientX;
            let currY = moveEv.clientY || moveEv.touches[0].clientY;
            let currAngle = Math.atan2(currY - centerY, currX - centerX) * 180 / Math.PI;
            let delta = currAngle - startAngle;
            let newRot = currentRot + delta;
            el.dataset.rotation = newRot;
            applyTransform(el);
            
            const id = el.id;
            if (images[id]) imagesRef.child(id).update({ rotation: newRot });
        }
        
        function stopRotate() {
            document.removeEventListener('mousemove', onRotate);
            document.removeEventListener('mouseup', stopRotate);
            document.removeEventListener('touchmove', onRotate);
            document.removeEventListener('touchend', stopRotate);
        }
        
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
        document.addEventListener('touchmove', onRotate, { passive: false });
        document.addEventListener('touchend', stopRotate);
    }
    
    function selectImage(id) { deselectAll(); selectedImageId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('image-controls').style.display = 'flex'; document.getElementById('lock-btn').textContent = el.classList.contains('locked') ? '🔓 Открепить' : '🔒 Закрепить'; } updateThumbnails(); }
    function selectText(id) { deselectAll(); selectedTextId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('text-controls').style.display = 'flex'; } updateThumbnails(); }
    function selectWidget(id) { deselectAll(); selectedWidgetId = id; let el = document.getElementById(id); if(el) { el.classList.add('selected'); document.getElementById('widget-controls').style.display = 'flex'; } updateThumbnails(); }
    function selectSound(id) { deselectAll(); selectedSoundId = id; document.getElementById('sound-controls').style.display = 'flex'; updateThumbnails(); }
    
    function deselectAll() {
        document.querySelectorAll('.selected').forEach(e => e.classList.remove('selected'));
        document.getElementById('image-controls').style.display = 'none';
        document.getElementById('text-controls').style.display = 'none';
        document.getElementById('sound-controls').style.display = 'none';
        document.getElementById('widget-controls').style.display = 'none';
        selectedImageId = selectedTextId = selectedSoundId = selectedWidgetId = null;
    }
    
    function toggleVisibility(id, type) {
        let el = document.getElementById(id);
        if (!el) return;
        let newDisplay = el.style.display === 'none' ? 'block' : 'none';
        el.style.display = newDisplay;
        if (type === 'image') imagesRef.child(id).update({ display: newDisplay });
        else if (type === 'text') textsRef.child(id).update({ display: newDisplay });
        else if (type === 'widget') widgetsRef.child(id).update({ display: newDisplay });
        else if (type === 'sound') soundsRef.child(id).update({ display: newDisplay });
        updateThumbnails();
    }
    
    function deleteElement(id, type) {
        if (type === 'image') imagesRef.child(id).remove();
        else if (type === 'text') textsRef.child(id).remove();
        else if (type === 'widget') widgetsRef.child(id).remove();
        else if (type === 'sound') soundsRef.child(id).remove();
        deselectAll();
    }
    
    function createThumbnail(id, type, preview, name) {
        let thumb = document.createElement('div');
        thumb.className = 'thumbnail';
        
        let data = images[id] || texts[id] || widgets[id] || sounds[id];
        if (data && data.display === 'none') thumb.classList.add('thumbnail-hidden');
        
        let previewDiv = document.createElement('div');
        if (type === 'image') {
            let img = document.createElement('img');
            img.src = preview;
            previewDiv.appendChild(img);
        } else {
            previewDiv.className = type === 'text' ? 'text-thumbnail' : (type === 'widget' ? 'widget-thumbnail' : 'sound-thumbnail');
            previewDiv.textContent = name ? name.substring(0, 6) : (type === 'text' ? '📝' : (type === 'widget' ? '🧩' : '🔊'));
        }
        thumb.appendChild(previewDiv);
        
        let eyeBtn = document.createElement('div');
        eyeBtn.className = 'thumbnail-eye' + (data && data.display === 'none' ? ' hidden' : '');
        eyeBtn.textContent = data && data.display === 'none' ? '👁‍🗨' : '👁';
        eyeBtn.onclick = (e) => { e.stopPropagation(); toggleVisibility(id, type); };
        thumb.appendChild(eyeBtn);
        
        let delBtn = document.createElement('div');
        delBtn.className = 'thumbnail-delete';
        delBtn.textContent = '✕';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteElement(id, type); };
        thumb.appendChild(delBtn);
        
        thumb.onclick = () => {
            if (type === 'image') selectImage(id);
            else if (type === 'text') selectText(id);
            else if (type === 'widget') selectWidget(id);
            else if (type === 'sound') selectSound(id);
        };
        
        return thumb;
    }
    
    function updateThumbnails() {
        let container = document.getElementById('thumbnails');
        container.innerHTML = '';
        for (let id in images) container.appendChild(createThumbnail(id, 'image', images[id].src, null));
        for (let id in texts) container.appendChild(createThumbnail(id, 'text', null, texts[id].text));
        for (let id in widgets) container.appendChild(createThumbnail(id, 'widget', null, widgets[id].name));
        for (let id in sounds) container.appendChild(createThumbnail(id, 'sound', null, sounds[id].name));
    }
    
    function addWidgetByUrl(url, name, width, height) {
        if (!url) return alert('Введите URL');
        let finalUrl = url.startsWith('http') ? url : 'https://' + url;
        let id = createId('widget');
        widgetsRef.child(id).set({
            id, url: finalUrl, name: name || 'Виджет',
            x: 50, y: 50, width: width || 400, height: height || 300,
            opacity: 1, locked: false, display: 'block'
        });
        closeModal('widget-modal');
    }
    
    function syncElements() {
        updateCanvasSize();
        
        for (let id in images) {
            let data = images[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-image';
                let img = document.createElement('img');
                img.src = data.src;
                el.appendChild(img);
                document.getElementById('images-layer').appendChild(el);
                addResizeHandles(el);
                addRotateHandle(el);
                makeDraggable(el, 'image');
            }
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.width + 'px';
            el.style.height = data.height + 'px';
            el.style.opacity = data.opacity || 1;
            el.style.filter = `brightness(${data.brightness || 100}%)`;
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
            if (data.rotation) el.dataset.rotation = data.rotation;
            if (data.flipHorizontal) el.dataset.flipH = 'true';
            if (data.flipVertical) el.dataset.flipV = 'true';
            applyTransform(el);
        }
        
        for (let id in texts) {
            let data = texts[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-text';
                el.textContent = data.text;
                document.getElementById('texts-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el, 'text');
                el.ondblclick = () => editText(id);
            }
            el.textContent = data.text;
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.fontSize = data.fontSize + 'px';
            el.style.color = data.color;
            el.style.fontFamily = data.fontFamily;
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
        }
        
        for (let id in widgets) {
            let data = widgets[id];
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'draggable-widget';
                el.innerHTML = `<iframe src="${data.url.replace(/&/g, '&amp;')}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation" style="width:100%; height:100%; border:none; background:white;"></iframe><div class="widget-error" style="display:none;"><span>⚠️</span><div>Не удалось загрузить</div><button class="retry-widget" style="margin-top:8px;">🔄 Повторить</button></div>`;
                document.getElementById('widgets-layer').appendChild(el);
                addResizeHandles(el);
                makeDraggable(el, 'widget');
                el.querySelector('.retry-widget')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let iframe = el.querySelector('iframe');
                    if (iframe) iframe.src = iframe.src;
                    el.querySelector('.widget-error').style.display = 'none';
                });
            }
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.width + 'px';
            el.style.height = data.height + 'px';
            el.style.display = data.display === 'none' ? 'none' : 'block';
            if (data.locked) el.classList.add('locked');
            else el.classList.remove('locked');
        }
        
        updateThumbnails();
    }
    
    function editText(id) {
        let data = texts[id];
        if (!data) return;
        document.getElementById('text-input-area').value = data.text;
        document.getElementById('font-size-slider').value = data.fontSize;
        document.getElementById('text-color-picker').value = data.color;
        document.getElementById('font-family-select').value = data.fontFamily;
        document.getElementById('text-modal').style.display = 'block';
        
        let oldApply = document.getElementById('apply-text-simple').onclick;
        document.getElementById('apply-text-simple').onclick = () => {
            let newText = document.getElementById('text-input-area').value.trim();
            if (newText) {
                textsRef.child(id).update({
                    text: newText,
                    fontSize: parseInt(document.getElementById('font-size-slider').value),
                    color: document.getElementById('text-color-picker').value,
                    fontFamily: document.getElementById('font-family-select').value
                });
            }
            document.getElementById('text-modal').style.display = 'none';
            document.getElementById('apply-text-simple').onclick = oldApply;
        };
    }
    
    // Firebase listeners
    imagesRef.on('value', s => { images = s.val() || {}; syncElements(); });
    textsRef.on('value', s => { texts = s.val() || {}; syncElements(); });
    widgetsRef.on('value', s => { widgets = s.val() || {}; syncElements(); });
    soundsRef.on('value', s => { sounds = s.val() || {}; updateThumbnails(); });
    savedWidgetsRef.on('value', s => { savedWidgets = s.val() || {}; updateSavedList(); });
    
    function updateSavedList() {
        let list = document.getElementById('saved-widgets-list');
        if (list) {
            list.innerHTML = '';
            Object.values(savedWidgets).forEach(w => {
                let div = document.createElement('div');
                div.className = 'saved-widget-item';
                div.innerHTML = `<span style="flex:1;">${w.name || 'Виджет'}</span><button class="add-saved-widget" style="background:#4caf50;">+</button>`;
                div.querySelector('button').onclick = () => addWidgetByUrl(w.url, w.name, w.width, w.height);
                list.appendChild(div);
            });
        }
    }
    
    // Event listeners
    document.getElementById('add-text-btn').onclick = () => {
        document.getElementById('text-input-area').value = '';
        document.getElementById('font-size-slider').value = 24;
        document.getElementById('text-color-picker').value = '#000000';
        document.getElementById('text-modal').style.display = 'block';
        document.getElementById('apply-text-simple').onclick = () => {
            let txt = document.getElementById('text-input-area').value.trim();
            if (txt) {
                let id = createId('text');
                textsRef.child(id).set({
                    id, text: txt, x: 50, y: 50,
                    fontSize: parseInt(document.getElementById('font-size-slider').value),
                    color: document.getElementById('text-color-picker').value,
                    fontFamily: document.getElementById('font-family-select').value,
                    display: 'block', locked: false
                });
            }
            document.getElementById('text-modal').style.display = 'none';
        };
    };
    
    document.getElementById('add-widget-btn').onclick = () => document.getElementById('widget-modal').style.display = 'block';
    document.getElementById('add-widget-direct-btn').onclick = () => {
        let url = document.getElementById('widget-url-input').value.trim();
        let name = document.getElementById('widget-name-input').value.trim();
        let w = parseInt(document.getElementById('widget-width-input').value) || 400;
        let h = parseInt(document.getElementById('widget-height-input').value) || 300;
        addWidgetByUrl(url, name, w, h);
    };
    document.getElementById('save-widget-btn').onclick = () => {
        let url = document.getElementById('widget-url-input').value.trim();
        if (url) {
            savedWidgetsRef.push({
                url, name: document.getElementById('widget-name-input').value.trim() || 'Виджет',
                width: parseInt(document.getElementById('widget-width-input').value) || 400,
                height: parseInt(document.getElementById('widget-height-input').value) || 300
            });
            alert('Виджет сохранен!');
        } else alert('Введите URL');
    };
    
    document.querySelectorAll('.quick-widget-btn').forEach(btn => {
        btn.onclick = () => addWidgetByUrl(btn.dataset.url, btn.dataset.name, parseInt(btn.dataset.w), parseInt(btn.dataset.h));
    });
    
    document.querySelectorAll('.widgets-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.widgets-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.widgets-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + '-widget-content').classList.add('active');
        };
    });
    
    document.getElementById('file-input').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let img = new Image();
                img.onload = () => {
                    let id = createId('img');
                    imagesRef.child(id).set({
                        id, src: ev.target.result, x: 50, y: 50,
                        width: Math.min(400, img.width), height: Math.min(300, img.height),
                        opacity: 1, brightness: 100, display: 'block', locked: false
                    });
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        }
    };
    
    document.getElementById('sound-input').onchange = e => {
        let f = e.target.files[0];
        if (f) {
            let r = new FileReader();
            r.onload = ev => {
                let id = createId('sound');
                soundsRef.child(id).set({ id, src: ev.target.result, name: f.name, volume: 100, display: 'block' });
            };
            r.readAsDataURL(f);
        }
    };
    
    document.getElementById('clear-btn').onclick = () => { if(confirm('Очистить всё?')) { imagesRef.remove(); textsRef.remove(); soundsRef.remove(); widgetsRef.remove(); } };
    document.getElementById('delete-btn').onclick = () => { if(selectedImageId) imagesRef.child(selectedImageId).remove(); deselectAll(); };
    document.getElementById('delete-text-btn').onclick = () => { if(selectedTextId) textsRef.child(selectedTextId).remove(); deselectAll(); };
    document.getElementById('delete-widget-btn').onclick = () => { if(selectedWidgetId) widgetsRef.child(selectedWidgetId).remove(); deselectAll(); };
    document.getElementById('delete-sound-btn').onclick = () => { if(selectedSoundId) soundsRef.child(selectedSoundId).remove(); deselectAll(); };
    document.getElementById('hide-btn').onclick = () => { if(selectedImageId) toggleVisibility(selectedImageId, 'image'); };
    document.getElementById('hide-text-btn').onclick = () => { if(selectedTextId) toggleVisibility(selectedTextId, 'text'); };
    document.getElementById('hide-widget-btn').onclick = () => { if(selectedWidgetId) toggleVisibility(selectedWidgetId, 'widget'); };
    document.getElementById('lock-btn').onclick = () => { if(selectedImageId) { let el = document.getElementById(selectedImageId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); imagesRef.child(selectedImageId).update({ locked }); } };
    document.getElementById('lock-text-btn').onclick = () => { if(selectedTextId) { let el = document.getElementById(selectedTextId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); textsRef.child(selectedTextId).update({ locked }); } };
    document.getElementById('lock-widget-btn').onclick = () => { if(selectedWidgetId) { let el = document.getElementById(selectedWidgetId); let locked = !el.classList.contains('locked'); el.classList.toggle('locked', locked); widgetsRef.child(selectedWidgetId).update({ locked }); } };
    document.getElementById('flip-h-btn').onclick = () => { if(selectedImageId) { let el = document.getElementById(selectedImageId); let val = el.dataset.flipH === 'true'; el.dataset.flipH = (!val).toString(); applyTransform(el); imagesRef.child(selectedImageId).update({ flipHorizontal: !val }); } };
    document.getElementById('flip-v-btn').onclick = () => { if(selectedImageId) { let el = document.getElementById(selectedImageId); let val = el.dataset.flipV === 'true'; el.dataset.flipV = (!val).toString(); applyTransform(el); imagesRef.child(selectedImageId).update({ flipVertical: !val }); } };
    document.getElementById('settings-btn').onclick = () => document.getElementById('properties-modal').style.display = 'block';
    document.getElementById('opacity-slider').oninput = e => { if(selectedImageId) imagesRef.child(selectedImageId).update({ opacity: e.target.value / 100 }); };
    document.getElementById('brightness-slider').oninput = e => { if(selectedImageId) imagesRef.child(selectedImageId).update({ brightness: e.target.value }); };
    document.getElementById('play-btn').onclick = () => { if(selectedSoundId && sounds[selectedSoundId]) { let a = document.getElementById('audio-element'); a.src = sounds[selectedSoundId].src; a.volume = (sounds[selectedSoundId].volume || 100) / 100; a.play(); } };
    document.getElementById('pause-btn').onclick = () => document.getElementById('audio-element').pause();
    document.getElementById('volume-slider').oninput = e => { if(selectedSoundId) soundsRef.child(selectedSoundId).update({ volume: e.target.value }); };
    document.getElementById('reload-widget-btn').onclick = () => { if(selectedWidgetId) { let el = document.getElementById(selectedWidgetId); let iframe = el?.querySelector('iframe'); if(iframe) iframe.src = iframe.src; } };
    document.getElementById('edit-widget-url-btn').onclick = () => {
        if(selectedWidgetId && widgets[selectedWidgetId]) {
            document.getElementById('edit-widget-url').value = widgets[selectedWidgetId].url;
            document.getElementById('edit-url-modal').style.display = 'block';
            document.getElementById('apply-url-btn').onclick = () => {
                let newUrl = document.getElementById('edit-widget-url').value.trim();
                if(newUrl) {
                    widgetsRef.child(selectedWidgetId).update({ url: newUrl });
                    let el = document.getElementById(selectedWidgetId);
                    if(el) { let iframe = el.querySelector('iframe'); if(iframe) iframe.src = newUrl; }
                }
                document.getElementById('edit-url-modal').style.display = 'none';
            };
        }
    };
    document.getElementById('edit-text-btn').onclick = () => { if(selectedTextId) editText(selectedTextId); };
    document.getElementById('add-sound-btn').onclick = () => document.getElementById('sound-input').click();
    
    updateCanvasSize();
    window.addEventListener('resize', () => { updateCanvasSize(); syncElements(); });
    setTimeout(() => syncElements(), 100);
</script>
</body>
</html>
